<style>
:root{
  --bg: #0B0E0C; --bg-2: #12160F; --panel: #161C16; --panel-2: #1C231B;
  --line: #2A322A; --ink: #EDEFE9; --ink-dim: #98A092;
  --gold: #FFDD00; --gold-dim: #7A611F; --lime: #C6FF3D;
  --amber-glow: rgba(255,221,0,.16); --red: #FF3D5A; --red-dim: rgba(255,61,90,.16);
  --cyan: #3DFFE8; --menu-bg: rgba(15,18,14,.72);
}
body.tema-claro{
  --bg: #F5F6F0; --bg-2: #FFFFFF; --panel: #FFFFFF; --panel-2: #EEF0E7;
  --line: #DCE0D4; --ink: #1B1F16; --ink-dim: #5C6353;
  --gold: #8A6D00; --gold-dim: #C9AE55; --lime: #4F7A12;
  --amber-glow: rgba(138,109,0,.10); --red: #C6304A; --red-dim: rgba(198,48,74,.10);
  --cyan: #0E7A6E; --menu-bg: rgba(255,255,255,.78);
}
*{box-sizing:border-box;}
html,body{ margin:0; background:var(--bg); color:var(--ink); }
body{
  font-family:'Inter',system-ui,sans-serif; padding-bottom:70px;
  background:
    radial-gradient(1100px 500px at 85% -10%, rgba(242,183,5,.08), transparent 60%),
    radial-gradient(900px 400px at 5% 0%, rgba(159,232,112,.06), transparent 55%),
    var(--bg);
}
.disp{ font-family:'Space Grotesk',sans-serif; }
.mono{ font-family:'JetBrains Mono',monospace; }

/* ---- HERO / NAV ---- */
.hero{ padding:28px 5vw 0 5vw; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg); z-index:50;}
.hero-top{ display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:16px; padding-bottom:18px;}
.hero-eyebrow{ font-size:11.5px; letter-spacing:3px; text-transform:uppercase; color:var(--gold); font-weight:600; font-family:'JetBrains Mono',monospace; }
.hero h1{ font-family:'Space Grotesk',sans-serif; font-size:clamp(26px,3.6vw,36px); margin:7px 0 5px 0; font-weight:700; letter-spacing:-.5px; }
.hero p{ margin:0; color:var(--ink-dim); font-size:13px; max-width:560px; }
.hero-actions{ display:flex; gap:10px; flex-wrap:wrap; }

.hero{ position:sticky; top:0; z-index:50; }
.hero-bg-milho, .hero-bg-soja, .hero-bg-algodao{
  background-repeat:no-repeat; background-position:center; background-size:cover;
  background-color:var(--bg);
}

.hero-eyebrow, .hero h1, .hero p{ text-shadow: 0 1px 8px rgba(0,0,0,.85); }

.btn{
  background:var(--gold); color:#181300; border:none; padding:10px 18px; border-radius:8px;
  font-weight:700; cursor:pointer; font-size:13.5px; font-family:'Inter',sans-serif; white-space:nowrap;
}
.btn:hover{ background:#ffce33; }
.btn.ghost{ background:transparent; color:var(--ink-dim); border:1px solid var(--line); }
.btn.ghost:hover{ color:var(--ink); border-color:var(--ink-dim); }
.btn.sm{ padding:6px 12px; font-size:12px; }
.btn.danger{ background:transparent; color:var(--red); border:1px solid var(--red-dim); }
.btn.danger:hover{ background:var(--red-dim); }
.btn.pdf{ background:transparent; color:var(--gold); border:1px solid var(--gold-dim); display:inline-flex; align-items:center; gap:6px; }
.btn.pdf:hover{ background:var(--amber-glow); border-color:var(--gold); }
.btn.pdf.loading{ opacity:.6; pointer-events:none; }
.btn:disabled{ opacity:.5; cursor:not-allowed; }

.readonly-banner{ display:none; background:linear-gradient(90deg, var(--gold), #ffce33); color:#1a1400; font-weight:700; font-size:12.5px; text-align:center; padding:8px; letter-spacing:.4px; }
body.read-only .readonly-banner{ display:block; }
body.read-only #cardAcoesRapidas{ display:none; }
body.read-only [data-tab="usuarios"], body.sem-acesso-usuarios [data-tab="usuarios"]{ display:none; }
body.read-only #tab-usuarios, body.sem-acesso-usuarios #tab-usuarios{ display:none !important; }
body.sem-liberar-acesso-motorista .cred-btn-acesso{ display:none; }
body.sem-senha-motorista .cred-btn-senha{ display:none; }
body.read-only .actions-row button,
body.read-only h2 button,
body.read-only #btnNovaCarga,
body.read-only #btnImportContratoPDF{
  display:none !important;
}
body.read-only input:not(.filter-input),
body.read-only select,
body.read-only textarea{
  pointer-events:none; opacity:.65;
}
.tabs{ display:flex; gap:4px; overflow-x:auto; justify-content:center; flex-wrap:wrap; background:linear-gradient(rgba(0,0,0,.15), rgba(0,0,0,.55)); border-radius:10px 10px 0 0; padding:2px 6px 0 6px; }
.tab-btn{
  background:none; border:none; color:#e8e6df; font-family:'Inter',sans-serif; font-weight:600;
  font-size:13.5px; padding:12px 16px; cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap;
  text-shadow:0 1px 6px rgba(0,0,0,.9);
}
.tab-btn:hover{ color:#fff; }
.tab-btn.active{ color:var(--gold); border-bottom-color:var(--gold); }

main{ padding:24px 5vw 40px 5vw; max-width:1400px; margin:0 auto; }
.tab-panel{ display:none; }
.tab-panel.active{ display:block; animation:fadein .18s ease; }
@keyframes fadein{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

/* ---- LAYOUT PRIMITIVES (usados nas abas de gestão) ---- */
.grid{ display:grid; gap:16px; }
.grid.cols-4{ grid-template-columns:repeat(4,1fr); }
.grid.cols-3{ grid-template-columns:repeat(3,1fr); }
.grid.cols-2{ grid-template-columns:repeat(2,1fr); }
@media(max-width:900px){ .grid.cols-4{grid-template-columns:repeat(2,1fr);} .grid.cols-3{grid-template-columns:repeat(2,1fr);} .grid.cols-2{grid-template-columns:1fr;} }
@media(max-width:560px){ .grid.cols-4{grid-template-columns:1fr;} }

.card{ background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:20px; }
.card h2{ font-family:'Space Grotesk',sans-serif; font-size:15px; margin:0 0 14px 0; font-weight:700; display:flex; align-items:center; justify-content:space-between; gap:10px; }
.card h2 small{ color:var(--ink-dim); font-weight:500; font-size:11.5px; font-family:'JetBrains Mono',monospace; }

.kpi{ background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px 20px; }
.kpi .label{ font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink-dim); font-family:'JetBrains Mono',monospace; }
.kpi .value{ font-family:'Space Grotesk',sans-serif; font-size:28px; font-weight:700; margin-top:6px; }
.kpi .sub{ font-size:12px; color:var(--ink-dim); margin-top:4px; }
.kpi .value.gold{ color:var(--gold); } .kpi .value.lime{ color:var(--lime); } .kpi .value.red{ color:var(--red); }

table{ width:100%; border-collapse:collapse; font-size:13px; }
th{ text-align:left; color:var(--ink-dim); font-weight:600; font-size:11px; letter-spacing:.5px; text-transform:uppercase; padding:8px 10px; border-bottom:1px solid var(--line); font-family:'JetBrains Mono',monospace; }
td{ padding:9px 10px; border-bottom:1px solid var(--line); }
tr:last-child td{ border-bottom:none; }
.total-row td{ font-weight:700; color:var(--gold); border-top:1px solid var(--line); }
.table-wrap{ overflow-x:auto; }
.tag{ display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; font-family:'JetBrains Mono',monospace; }
.tag.pending{ background:var(--amber-glow); color:var(--gold); }
.tag.ok{ background:rgba(198,255,61,.14); color:var(--lime); }
.tag.neg{ background:var(--red-dim); color:var(--red); }
.tag.muted{ background:rgba(152,160,146,.12); color:var(--ink-dim); }

/* ---- FORMS ---- */
label{ display:block; font-size:11.5px; color:var(--ink-dim); margin-bottom:5px; font-weight:600; letter-spacing:.3px; }
input, select, textarea{
  width:100%; background:var(--bg-2); border:1px solid var(--line); color:var(--ink); border-radius:8px;
  padding:9px 11px; font-size:13.5px; font-family:'Inter',sans-serif;
}
input:focus, select:focus, textarea:focus{ outline:none; border-color:var(--gold-dim); }
.field{ margin-bottom:14px; }
.form-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
@media(max-width:700px){ .form-grid{ grid-template-columns:repeat(2,1fr); } }
.form-grid .full{ grid-column:1/-1; }
.hint{ font-size:11.5px; color:var(--ink-dim); margin-top:4px; }
.computed{ background:var(--bg); border-color:var(--gold-dim); color:var(--lime); font-family:'JetBrains Mono',monospace; }

/* ---- MODAL ---- */
.modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(3px); display:flex; align-items:flex-start; justify-content:center; z-index:200; padding:5vh 16px; overflow-y:auto; }
.modal-overlay.hidden{ display:none; }
.modal{ background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:26px; width:100%; max-width:760px; }
.modal-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
.modal-head h3{ font-family:'Space Grotesk',sans-serif; margin:0; font-size:18px; }
.modal-close{ background:none; border:none; color:var(--ink-dim); font-size:20px; cursor:pointer; }

.dropzone{
  border:1.5px dashed var(--gold-dim); border-radius:12px; padding:22px; text-align:center; cursor:pointer;
  background:var(--bg-2); margin-bottom:16px; transition:.15s;
}
.dropzone.drag{ border-color:var(--gold); background:var(--amber-glow); }
.dropzone .icon{ font-size:26px; }
.dropzone b{ color:var(--gold); }
.dropzone small{ display:block; color:var(--ink-dim); margin-top:4px; }
.dropzone input{ display:none; }
.thumb-preview{ max-width:180px; max-height:180px; border-radius:8px; border:1px solid var(--line); margin:0 auto 10px auto; display:block; }

<script>
/* ============================================================
   BRC GRÃOS — Painel de Colheita & Romaneios
   Modelo: VENDA (NF de venda: produtor→empresa) 1 —— N ENTREGA
   Cada ENTREGA é um caminhão/romaneio; pode ter uma NF de Remessa
   (quando a empresa repassa a carga para outra) ou ser direta.
   ============================================================ */

const APP_SHELL_HTML = document.body.innerHTML; // estrutura original (cabeçalho, abas, main, modais, menu) — usada pra restaurar após a tela de login apagar tudo

const TIPOS_CONTRATO = ['Depósito a Fixar','Depósito','Complemento','Venda'];
if(window.pdfjsLib){ pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; }
const PESO_FISCAL_PADRAO = 46000;

const state = {
  empresas: [],    // {id, nome, cnpj}
  produtores: [],  // {id, nome, cpf}
  contratos: [],   // {id, tipo, empresaId, produtorId, culturaId, doc, volumeKg, valorKg, volumeSacas, valorSaca, alertaPercentual, localEntrega, obs}
  motoristas: [],  // {id, nome, placa}
  colheitas: [],   // {id, culturaId, variedadeId, area, talhao, produtorId} — cada lançamento é numerado na tela (1,2,3...)
  culturas: [],    // {id, nome:'Soja'|'Milho'|'Algodão', variedades:[{id,nome}]}
  vendas: [],      // ver schema abaixo
  entregas: [],    // ver schema abaixo
  usuarios: [],    // {id, usuario, senha, papel:'admin'|'produtor'|'motorista', produtorId, expiraEm}
  config: { fazenda:'', safra:'2026/2027', cultura:'Milho', descontoModo:'fatores' },
  loaded: false,
};

/* VENDA — a nota fiscal de venda original (produtor → empresa compradora)
{ id, empresaId, produtorId, contratoId, nrNF, dataNF, pesoFiscal, valorFiscal, chaveNFe, createdAt }

ENTREGA — um caminhão/romaneio, sempre vinculado a uma venda.
Se temRemessa=true, existe uma NF de Remessa (repasse para outra empresa = empresaDestinoId).
Se temRemessa=false, o destino é a própria empresa da venda.
{
  id, vendaId, temRemessa, nrNFRemessa, empresaDestinoId,
  motorista, placa, nrRomaneio, dataSaida,
  pesoFiscal, valorFiscal,
  pesoBruto, umidade, impureza, ardido, txRecebimento,
  pesoLiquidoComDesc, pesoLiquidoSemDesc,
  scsBruto, scsLiquidoComDesc, scsLiquidoSemDesc,
  precoFrete, valorFrete,
  status,  // 'pendente' (sem pesagem ainda) | 'aguardando_conferencia' | 'completo'
  createdAt, updatedAt
}
*/

function uid(prefix){ return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function num(v){
  if(v===null||v===undefined||v==='') return 0;
  if(typeof v === 'number') return isNaN(v) ? 0 : v;
  const cleaned = String(v).replace(/\./g,'').replace(',','.').replace(/[^\d.-]/g,'');
  const f = parseFloat(cleaned);
  return isNaN(f) ? 0 : f;
}
function fmt(n, casas){ return (n||0).toLocaleString('pt-BR',{maximumFractionDigits:casas??1, minimumFractionDigits:casas??1}); }
function fmtInt(n){ return Math.round(n||0).toLocaleString('pt-BR'); }
function fmtPct(n){ return fmt(n) + '%'; }
function fmtMoney(n){ return (n||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function stripAccents(s){ return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim().toLowerCase(); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function onlyDigits(v){ return String(v||'').replace(/\D/g,''); }
function toISODate(v){
  if(!v) return null;
  if(v instanceof Date) return v.toISOString().slice(0,10);
  if(typeof v === 'number'){
    const d = XLSX.SSF.parse_date_code(v);
    if(!d) return null;
    return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
  }
  const s = String(v).trim();
  const br = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if(br){ let [,d,m,y] = br; if(y.length===2) y = '20'+y; return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`; }
  const iso = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(iso) return `${iso[1]}-${iso[2].padStart(2,'0')}-${iso[3].padStart(2,'0')}`;
  const parsed = new Date(s);
  if(!isNaN(parsed)) return parsed.toISOString().slice(0,10);
  return null;
}
function dataBR(iso){
  if(!iso) return '—';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

/* ---------------- STORAGE (persistente, compartilhado com a equipe) ----------------
   Este painel roda fora do Claude.ai (hospedado no seu próprio servidor), então
   NÃO existe window.storage nativo. O bloco abaixo cria um window.storage compatível,
   que fala com a sua API (ver API_SPEC.md e /server para o backend de referência).
   Toda a lógica do app abaixo continua chamando window.storage.get/set normalmente —
   nada mais precisou mudar além deste adaptador. */
const API_BASE = 'https://brc-colheita.onrender.com/api';
const API_KEY  = '4a5441a6767987afbe08662078e02f84220272fe210226bf';

window.storage = {
  async get(key /*, shared */){
    const res = await fetch(`${API_BASE}/storage/${encodeURIComponent(key)}`, {
      headers: { 'x-api-key': API_KEY }
    });
    if(res.status === 404) return null;
    if(!res.ok) throw new Error(`storage.get(${key}) falhou: HTTP ${res.status}`);
    const data = await res.json();
    return { key, value: data.value, shared: true };
  },
  async set(key, value /*, shared */){
    const res = await fetch(`${API_BASE}/storage/${encodeURIComponent(key)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY },
      body: JSON.stringify({ value })
    });
    if(!res.ok) throw new Error(`storage.set(${key}) falhou: HTTP ${res.status}`);
    const data = await res.json();
    return { key, value: data.value, shared: true };
  },
  async delete(key /*, shared */){
    const res = await fetch(`${API_BASE}/storage/${encodeURIComponent(key)}`, {
      method: 'DELETE',
      headers: { 'x-api-key': API_KEY }
    });
    if(res.status === 404) return null;
    if(!res.ok) throw new Error(`storage.delete(${key}) falhou: HTTP ${res.status}`);
    const data = await res.json();
    return { key, deleted: true, shared: true, ...data };
  },
  async list(prefix /*, shared */){
    const qs = prefix ? `?prefix=${encodeURIComponent(prefix)}` : '';
    const res = await fetch(`${API_BASE}/storage${qs}`, { headers: { 'x-api-key': API_KEY } });
    if(!res.ok) throw new Error(`storage.list() falhou: HTTP ${res.status}`);
    const data = await res.json();
    return { keys: data.keys || [], prefix, shared: true };
  }
};

/* Consumo do contrato: soma o peso já entregue (peso líquido do romaneio quando já conferido,
   senão o peso fiscal da NF como estimativa) e compara com o volume contratado em KG.
   Só entram no cálculo as vendas com usarParaConfronto !== false (ver regra venda x remessa abaixo). */
function calcConsumoContrato(contrato){
  const volumeKg = num(contrato.volumeKg);
  const entregas = entregasDoContrato(contrato.id).filter(e=>{
    const v = vendaById(e.vendaId);
    return !v || v.usarParaConfronto !== false;
  });
  let consumidoKg = 0;
  entregas.forEach(e=>{
    if(e.status==='completo' && (e.pesoLiquidoSemDesc || e.pesoLiquidoComDesc)){
      consumidoKg += num(e.pesoLiquidoSemDesc || e.pesoLiquidoComDesc);
    } else {
      consumidoKg += num(e.pesoFiscal);
    }
  });
  const percentual = volumeKg > 0 ? (consumidoKg / volumeKg) * 100 : 0;
  const alerta = num(contrato.alertaPercentual) || 75;
  let status = 'ok';
  if(percentual >= 100) status = 'finalizado';
  else if(percentual >= alerta) status = 'atencao';
  return { consumidoKg, volumeKg, percentual, alerta, status };
}
/* Verifica prazos do contrato: janela de entrega (início/final) e data de pagamento.
   Tudo comparado com a data de hoje, sem hora, para não dar falso positivo no mesmo dia. */
function calcPrazosContrato(contrato){
  const hoje = todayISO();
  const consumo = calcConsumoContrato(contrato);
  const jaFinalizado = consumo.status === 'finalizado';

  let entrega = { status: 'sem_prazo', label: 'sem prazo definido' };
  if(contrato.dataFinalEntrega){
    if(jaFinalizado){ entrega = { status:'ok', label: 'concluído' }; }
    else if(hoje > contrato.dataFinalEntrega){ entrega = { status:'atrasado', label: 'entrega atrasada' }; }
    else {
      const dias = Math.round((new Date(contrato.dataFinalEntrega) - new Date(hoje)) / 86400000);
      if(dias <= 7) entrega = { status:'proximo', label: `entrega em ${dias}d` };
      else entrega = { status:'ok', label: `até ${dataBR(contrato.dataFinalEntrega)}` };
    }
  }

  let pagamento = { status: 'sem_prazo', label: 'sem data definida' };
  if(contrato.dataPagamento){
    if(hoje > contrato.dataPagamento) pagamento = { status:'atrasado', label: 'pagamento atrasado' };
    else {
      const dias = Math.round((new Date(contrato.dataPagamento) - new Date(hoje)) / 86400000);
      if(dias <= 7) pagamento = { status:'proximo', label: `pagamento em ${dias}d` };
      else pagamento = { status:'ok', label: `até ${dataBR(contrato.dataPagamento)}` };
    }
  }
  return { entrega, pagamento };
}
function tagPrazo(p){
  const classe = p.status==='atrasado' ? 'neg' : (p.status==='proximo' ? 'pending' : (p.status==='sem_prazo' ? 'muted' : 'ok'));
  return `<span class="tag ${classe}">${p.label}</span>`;
}
/* Extrai o(s) número(s) de contrato/negociação do texto de observação da NF,
   ex: "CONFIRMAÇÃO DE NEGÓCIO: 534/535" -> "534/535" */
function extractContratoNr(observacao){
  if(!observacao) return '';
  const m = String(observacao).match(/CONFIRMA[ÇC][ÃA]O\s+DE\s+NEG[ÓO]CIO:?\s*([0-9A-Za-z./-]+)/i);
  return m ? m[1].replace(/[.,]$/,'').trim() : '';
}
/* ---------------- REGRA VENDA x REMESSA NO MESMO CONTRATO ----------------
   Um mesmo contrato pode ter, em ordens diferentes, NFs de Remessa/Complemento
   (entrega física para uma empresa) e NFs de Venda (negócio comercial, geralmente
   para outra empresa/trading). Assim que existir ao menos uma NF de Venda para o
   contrato, ela — e só ela — deve ser usada no confronto com o romaneio (pesagem,
   consumo do contrato, conciliação). Remessa/Complemento continuam guardadas como
   comprovante de entrega, mas saem do confronto. Enquanto não houver NF de Venda
   para aquele contrato (ex: só chegou a remessa até agora), a remessa serve de
   confronto provisório — assim que a venda chegar, a prioridade muda sozinha. */
function classificarNatureza(natureza){
  const n = stripAccents(natureza);
  if(n.includes('venda')) return 'venda';
  if(n.includes('remessa')) return 'remessa';
  if(n.includes('complemento')) return 'complemento';
  return 'outro';
}
function contratoGroupKey(venda){
  return venda.contratoId ? ('id:'+venda.contratoId) : (venda.contratoNrRaw ? ('nr:'+venda.contratoNrRaw) : null);
}
function recalcUsarParaConfronto(groupKey){
  if(!groupKey) return;
  const grupo = state.vendas.filter(v=>contratoGroupKey(v)===groupKey);
  const temVenda = grupo.some(v=>v.role==='venda');
  grupo.forEach(v=>{ v.usarParaConfronto = v.role==='venda' ? true : !temVenda; });
}

/* ---------------- CÁLCULOS DE UMA ENTREGA (romaneio) ---------------- */
function recalcEntrega(e){
  e.pesoFiscal = num(e.pesoFiscal);
  e.pesoBruto = num(e.pesoBruto);
  e.umidade = num(e.umidade);
  e.impureza = num(e.impureza);
  e.ardido = num(e.ardido);
  e.txRecebimento = num(e.txRecebimento);
  e.pesoLiquidoComDesc = num(e.pesoLiquidoComDesc);
  e.precoFrete = num(e.precoFrete);

  if(!e.valorFiscal || e.valorFiscalAuto !== false){
    e.valorFiscal = +(e.pesoFiscal * 0.6).toFixed(2);
    e.valorFiscalAuto = true;
  }
  e.pesoLiquidoSemDesc = +(e.pesoLiquidoComDesc - e.umidade - e.impureza - e.ardido).toFixed(2);
  e.scsBruto = +(e.pesoBruto/60).toFixed(4);
  e.scsLiquidoComDesc = +(e.pesoLiquidoComDesc/60).toFixed(4);
  e.scsLiquidoSemDesc = +(e.pesoLiquidoSemDesc/60).toFixed(4);
  e.valorFrete = +(e.scsBruto * e.precoFrete).toFixed(2);
  return e;
}

/* ---------------- SALDOS DE CONTRATO (pelo destino final, entregas completas) ---------------- */
function calcSaldos(){
  return state.contratos.map(c=>{
    const vendasDoContrato = state.vendas.filter(v=>v.contratoId===c.id).map(v=>v.id);
    const entregasDoContrato = state.entregas.filter(e=>vendasDoContrato.includes(e.vendaId) && e.status==='completo');
    const scsEntregues = entregasDoContrato.reduce((a,e)=>a+e.scsLiquidoSemDesc,0);
    const isVenda = stripAccents(c.tipo)==='venda';
    const volume = num(c.volumeSacas);
    const saldo = isVenda ? (scsEntregues - volume) : scsEntregues;
    return { contrato:c, cargas: entregasDoContrato.length, scsEntregues, isVenda, volume, saldo };
  });
}

/* ---------------- AGREGAÇÕES PARA O DASHBOARD ---------------- */
function computeDashboard(){
  const completas = state.entregas.filter(e=>e.status==='completo');
  const joined = completas.map(e=>({ e, v: vendaById(e.vendaId) })).filter(x=>x.v);

  const totals = {
    cargas: joined.length,
    scsBruto: joined.reduce((a,x)=>a+x.e.scsBruto,0),
    scsLiquido: joined.reduce((a,x)=>a+x.e.scsLiquidoSemDesc,0),
  };
  const modo = state.config.descontoModo || 'fatores';
  joined.forEach(x=>{
    x.descKg = modo==='taxa' ? x.e.txRecebimento : (x.e.umidade+x.e.impureza+x.e.ardido);
    x.descScs = x.descKg/60;
  });
  totals.desconto = joined.reduce((a,x)=>a+x.descScs,0);
  totals.descontoPct = totals.scsBruto>0 ? (totals.desconto/totals.scsBruto*100) : 0;
  totals.umidadeScs = joined.reduce((a,x)=>a+x.e.umidade,0)/60;
  totals.impurezaScs = joined.reduce((a,x)=>a+x.e.impureza,0)/60;
  totals.ardidoScs = joined.reduce((a,x)=>a+x.e.ardido,0)/60;
  totals.umidadePct = totals.scsBruto>0 ? (totals.umidadeScs/totals.scsBruto*100) : 0;
  totals.impurezaPct = totals.scsBruto>0 ? (totals.impurezaScs/totals.scsBruto*100) : 0;
  totals.ardidoPct = totals.scsBruto>0 ? (totals.ardidoScs/totals.scsBruto*100) : 0;
  totals.descontoModo = modo;

  const validDates = joined.map(x=>x.e.dataSaida).filter(Boolean).sort();
  totals.dataInicio = validDates[0] || null;
  totals.dataFim = validDates[validDates.length-1] || null;

  const prodMap = new Map();
  joined.forEach(x=>{
    const key = x.v.produtorId || '(sem produtor)';
    if(!prodMap.has(key)) prodMap.set(key, {produtorId:key, cargas:0, scsBruto:0, scsLiquido:0, desconto:0});
    const p = prodMap.get(key);
    p.cargas++; p.scsBruto += x.e.scsBruto; p.scsLiquido += x.e.scsLiquidoSemDesc; p.desconto += x.descScs;
  });
  const producers = [...prodMap.values()].map(p=>({
    nome: produtorNome(p.produtorId), cargas:p.cargas, scsBruto:p.scsBruto, scsLiquido:p.scsLiquido,
    desconto:p.desconto, descontoPct: p.scsBruto>0 ? (p.desconto/p.scsBruto*100) : 0
  })).sort((a,b)=>b.scsLiquido-a.scsLiquido);

  const motMap = new Map();
  joined.forEach(x=>{
    const key = x.e.motorista || '(sem motorista)';
    if(!motMap.has(key)) motMap.set(key, {nome:key, romaneios:new Set(), scsLiquido:0});
    const m = motMap.get(key);
    m.romaneios.add(String(x.e.nrRomaneio||x.e.id)); m.scsLiquido += x.e.scsLiquidoSemDesc;
  });
  const drivers = [...motMap.values()].map(m=>({nome:m.nome, cargas:m.romaneios.size, scsLiquido:m.scsLiquido}))
    .sort((a,b)=>b.scsLiquido-a.scsLiquido);

  const contratoMap = new Map();
  joined.forEach(x=>{
    const key = x.v.contratoId || '(sem contrato)';
    if(!contratoMap.has(key)) contratoMap.set(key, {contratoId:key, romaneios:new Set(), scsLiquido:0});
    const cc = contratoMap.get(key);
    cc.romaneios.add(String(x.e.nrRomaneio||x.e.id)); cc.scsLiquido += x.e.scsLiquidoSemDesc;
  });
  const contratosResumo = [...contratoMap.values()].map(cc=>({
    contrato: cc.contratoId==='(sem contrato)' ? '(sem contrato)' : (contratoById(cc.contratoId)?.doc || '—'),
    cargas: cc.romaneios.size, scsLiquido: cc.scsLiquido
  })).sort((a,b)=>b.scsLiquido-a.scsLiquido);

  const dateMap = new Map();
  joined.forEach(x=>{
    if(!x.e.dataSaida) return;
    dateMap.set(x.e.dataSaida, (dateMap.get(x.e.dataSaida)||0) + x.e.scsLiquidoSemDesc);
  });
  const evolution = [...dateMap.entries()].sort((a,b)=>a[0]<b[0]?-1:1);
  let acc = 0;
  const evolutionAcc = evolution.map(([d,s])=>{ acc+=s; return {data:d, scs:s, acumulado:acc}; });

  const romMap = new Map();
  joined.forEach(x=>{
    const key = String(x.e.nrRomaneio || x.e.id);
    if(!romMap.has(key)) romMap.set(key, {romaneio: x.e.nrRomaneio || '—', desconto:0, ordem: num(x.e.nrRomaneio)||0});
    romMap.get(key).desconto += x.descScs;
  });
  const romaneioDiscount = [...romMap.values()].sort((a,b)=>a.ordem-b.ordem);

  const pending = state.entregas.filter(e=>e.status==='pendente').map(e=>{
    const v = vendaById(e.vendaId);
    return {
      proprietario: v ? produtorNome(v.produtorId) : '—',
      natureza: v && v.contratoId ? (contratoById(v.contratoId)?.tipo || '') : '',
      contrato: v && v.contratoId ? (contratoById(v.contratoId)?.doc || '') : '',
      nf: v ? v.nrNF : '', motorista: e.motorista || ''
    };
  });

  return { totals, producers, drivers, contratosResumo, evolution: evolutionAcc, romaneioDiscount, pending, saldos: calcSaldos() };
}

/* ---------------- IA: LEITURA AUTOMÁTICA DO ROMANEIO (VISÃO) ---------------- */
async function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload = () => resolve(r.result.split(',')[1]);
    r.onerror = () => reject(new Error('Falha ao ler o arquivo'));
    r.readAsDataURL(file);
  });
}

async function ocrRomaneio(file){
  const base64 = await fileToBase64(file);
  const mediaType = file.type || 'image/jpeg';
  const prompt = `Você é um sistema de digitação de romaneios de recebimento de milho em armazém de cereais no Brasil.
Extraia os dados visíveis na imagem do romaneio/ticket de balança e responda APENAS com um JSON válido (sem markdown, sem texto antes ou depois), usando exatamente estas chaves:
{
 "empresaNome": string ou null (nome do armazém/empresa que recebeu a carga),
 "nrNFRemessa": string ou null (número da NF de remessa, se aparecer),
 "motorista": string ou null,
 "placa": string ou null,
 "nrRomaneio": string ou null,
 "dataSaida": string ou null (formato AAAA-MM-DD),
 "pesoBruto": number ou null (kg),
 "umidade": number ou null (desconto de umidade em kg),
 "impureza": number ou null (desconto de impureza em kg),
 "ardido": number ou null (desconto de ardido/avariado em kg),
 "txRecebimento": number ou null (kg),
 "pesoLiquidoComDesc": number ou null (peso líquido final em kg, valor final destacado no romaneio),
 "precoFrete": number ou null (R$ por saca, se aparecer)
}
Atenção: em alguns romaneios (ex: C.Vale) o nome do motorista aparece colado depois da placa na mesma linha "Placa: XXX0000 - - NOME". Nesse caso, extraia a placa (só letras/números) em "placa" e o nome que vem depois em "motorista", mesmo que não haja um campo separado escrito "Motorista".
Se um campo não estiver legível ou não existir na imagem, use null. Não invente valores. Responda somente o JSON.`;

  const response = await fetch(`${API_BASE}/ocr-romaneio`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": API_KEY },
    body: JSON.stringify({ base64, mediaType, prompt })
  });
  if(!response.ok) throw new Error('Falha ao consultar IA (status ' + response.status + ')');
  const data = await response.json();
  const textBlock = (data.content || []).map(b=>b.text||'').join('\n').trim();
  const clean = textBlock.replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
  let parsed;
  try{ parsed = JSON.parse(clean); }
  catch(e){ throw new Error('A IA não retornou um JSON válido. Tente uma foto mais nítida.'); }
  return parsed;
}

async function salvarUsuario(id){
  const usuario = document.getElementById('fUsuarioLogin').value.trim();
  const senha = document.getElementById('fUsuarioSenha').value.trim();
  const papel = document.getElementById('fUsuarioPapel').value;
  const expiraEm = document.getElementById('fUsuarioExpira').value || null;
  const podeGerenciarUsuarios = papel==='admin' ? document.getElementById('fUsuarioPodeUsuarios').checked : null;
  const podeLiberarAcessoMotorista = papel==='admin' ? document.getElementById('fUsuarioPodeAcesso').checked : null;
  const podeDefinirSenhaMotorista = papel==='admin' ? document.getElementById('fUsuarioPodeSenha').checked : null;
  if(!usuario){ toast('Informe o usuário.', true); return; }
  if(!senha){ toast('Informe a senha.', true); return; }
  const duplicado = state.usuarios.find(u=>u.usuario.toLowerCase()===usuario.toLowerCase() && u.id!==id);
  if(duplicado){ toast('Já existe um usuário com esse nome.', true); return; }
  if(id){
    const u = state.usuarios.find(x=>x.id===id);
    Object.assign(u, { usuario, senha, papel, expiraEm, podeGerenciarUsuarios, podeLiberarAcessoMotorista, podeDefinirSenhaMotorista });
  }else{
    state.usuarios.push({ id: uid('user'), usuario, senha, papel, expiraEm, podeGerenciarUsuarios, podeLiberarAcessoMotorista, podeDefinirSenhaMotorista });
  }
  await saveUsuarios();
  closeCadastroModal();
  renderUsuarios();
  toast('Usuário salvo.');
}
async function salvarSenhaMotorista(motoristaId){
  const m = state.motoristas.find(x=>x.id===motoristaId);
  if(!m?.placa){ toast('Cadastre a placa deste motorista antes de definir uma senha.', true); return; }
  const senha = document.getElementById('fSenhaMotoristaValor').value.trim();
  if(!senha){ toast('Digite uma senha (ou use "Voltar pra senha padrão" para remover).', true); return; }
  const usuarioPlaca = normalizarPlaca(m.placa);
  let acesso = state.usuarios.find(u=>u.papel==='motorista' && u.motoristaId===motoristaId);
  if(acesso){ acesso.senha = senha; acesso.usuario = usuarioPlaca; }
  else{ state.usuarios.push({ id: uid('user'), usuario: usuarioPlaca, papel:'motorista', motoristaId, expiraEm:null, senha }); }
  await saveUsuarios();
  closeCadastroModal();
  renderCadastros();
  renderUsuarios();
  toast('Senha individual definida para este motorista.');
}
async function voltarSenhaPadraoMotorista(motoristaId){
  const acesso = state.usuarios.find(u=>u.papel==='motorista' && u.motoristaId===motoristaId);
  if(acesso) delete acesso.senha;
  await saveUsuarios();
  closeCadastroModal();
  renderCadastros();
  renderUsuarios();
  toast('Este motorista voltou a usar a senha padrão da fazenda.');
}
async function liberarAcessoMotorista(motoristaId){
  const m = state.motoristas.find(x=>x.id===motoristaId);
  if(!m?.placa){ toast('Cadastre a placa deste motorista antes de liberar o acesso.', true); return; }
  if(!state.config.fazenda){ toast('Preencha o nome da fazenda em "Dados de Colheita" antes de liberar acessos de motorista.', true); return; }
  const expiraEm = document.getElementById('fAcessoMotoristaExpira').value || null;
  const usuarioPlaca = normalizarPlaca(m.placa);
  let acesso = state.usuarios.find(u=>u.papel==='motorista' && u.motoristaId===motoristaId);
  const duplicado = state.usuarios.find(u=>u.usuario===usuarioPlaca && u.motoristaId!==motoristaId);
  if(duplicado){ toast('Já existe outro acesso liberado com essa placa.', true); return; }
  if(acesso){
    Object.assign(acesso, { usuario: usuarioPlaca, expiraEm });
  }else{
    state.usuarios.push({ id: uid('user'), usuario: usuarioPlaca, papel:'motorista', motoristaId, expiraEm });
  }
  await saveUsuarios();
  closeCadastroModal();
  renderCadastros();
  renderUsuarios();
  toast('Acesso do motorista liberado.');
}
async function revogarAcessoMotorista(motoristaId){
  if(!confirm('Revogar o acesso deste motorista? O login dele deixará de funcionar.')) return;
  state.usuarios = state.usuarios.filter(u=>!(u.papel==='motorista' && u.motoristaId===motoristaId));
  await saveUsuarios();
  closeCadastroModal();
  renderCadastros();
  renderUsuarios();
  toast('Acesso revogado.');
}
async function excluirUsuario(id){
  if(!confirm('Excluir este usuário? O login dele deixará de funcionar.')) return;
  state.usuarios = state.usuarios.filter(u=>u.id!==id);
  await saveUsuarios();
  renderUsuarios();
  toast('Usuário excluído.');
}

/* ---------------- HELPERS GENÉRICOS DE FILTRO ---------------- */
const TBODY_UPDATERS = {};
function onFilterInput(tableKey){ const fn = TBODY_UPDATERS[tableKey]; if(fn) fn(); }
function getFilterValues(tableKey){
  const vals = {};
  document.querySelectorAll(`.filter-input[data-ftable="${tableKey}"]`).forEach(inp=>{ vals[inp.dataset.fkey] = inp.value; });
  return vals;
}
function rowMatches(extract, filters){
  return Object.keys(filters).every(k=>{
    const f = filters[k]; if(!f) return true;
    return stripAccents(String(extract[k]??'')).includes(stripAccents(f));
  });
}
function filterHeaderCells(tableKey, cols){
  // cols: [{key, label}] — key null = coluna sem filtro (ex: ações)
  const ths = cols.map(c=>`<th><div class="th-flex"><span>${c.label}</span>${c.key ? `<input type="text" class="filter-input mini" data-ftable="${tableKey}" data-fkey="${c.key}" placeholder="filtrar" oninput="onFilterInput('${tableKey}')">` : ''}</div></th>`).join('');
  return `<tr>${ths}</tr>`;
}
function emptyRow(cols,msg){ return `<tr><td colspan="${cols}" style="text-align:center;color:var(--ink-dim);padding:20px;">${msg}</td></tr>`; }

  state.empresas = state.empresas.filter(e=>e.id!==id);

function deleteProdutor(id){
  const emUso = state.contratos.some(c=>c.produtorId===id) || state.vendas.some(v=>v.produtorId===id);

function labelColheita(colheitaId){
  if(!colheitaId) return null;

  const cultura = c.culturaId ? culturaById(c.culturaId) : null;
  const variedade = cultura ? cultura.variedades.find(v=>v.id===c.variedadeId) : null;
  return `Nº ${i+1}${variedade?' — '+variedade.nome:''}${c.talhao?' — '+c.talhao:''}`;

      pesoFiscal: (e.pesoFiscal || v?.pesoFiscal) ? fmt(e.pesoFiscal || v.pesoFiscal,0) : '',
      valorFiscal: (e.valorFiscal || v?.valorFiscal) ? fmtMoney(e.valorFiscal || v.valorFiscal) : '',

          : `<button class="btn ghost sm" onclick="openCadastroModal('selecionarColheita','${v.id}')">Selecionar colheita</button>`)

      <td class="mono" style="font-size:11.5px">${extract.contrato||'—'}</td><td>${extract.nfVenda||'—'}</td><td>${extract.data}</td>
      <td>${colheitaCell}</td>
      <td>${extract.pesoFiscal ? extract.pesoFiscal+' kg' : '<span class="small-note">a informar</span>'}</td>

      <td>${e.status==='pendente' ? '—' : extract.scs}</td><td>${statusTag(e.status)}</td>

  }).filter(r=>rowMatches(r.extract, filters));

let conciliacaoResultado = null; // não persiste — é só um comparativo pontual
function renderConciliacao(){
  const el = document.getElementById('conferenciaConteudo');
  const resumo = conciliacaoResultado ? conciliacaoResultado.reduce((acc,r)=>{ acc[r.status]=(acc[r.status]||0)+1; return acc; }, {}) : null;
  el.innerHTML = `
    <div class="card" style="margin-bottom:20px;">
      <h2>Conciliação com romaneio da empresa compradora</h2>
      <p class="small-note" style="margin-top:-6px;margin-bottom:14px;">
        Importe a planilha de romaneios que a empresa (destino final) te enviar. O sistema tenta casar cada linha pela NF
        e compara o peso que ela registrou com o peso que já temos aqui.
      </p>
      <div class="actions-row">
        <button class="btn sm" id="btnImportConciliacao">📥 Importar romaneio da empresa</button>
        <input type="file" id="importConciliacaoInput" accept=".xlsx,.xls" style="display:none">
      </div>
      ${resumo ? `<div class="actions-row" style="margin-top:14px;">
        <span class="tag ok">${resumo.ok||0} conferem</span>
        <span class="tag pending">${resumo.divergente||0} divergentes</span>
        <span class="tag muted">${resumo.nao_encontrado||0} não encontrados aqui</span>
      </div>` : ''}
    </div>
    ${conciliacaoResultado ? `
    <div class="card">
      <div class="table-wrap"><table>
        <thead><tr><th>Nº NF</th><th>Placa</th><th>Peso — empresa</th><th>Peso — nosso</th><th>Diferença</th><th>Status</th></tr></thead>
        <tbody>
          ${conciliacaoResultado.map(r=>`<tr>
            <td>${r.nrNF||'—'}</td><td>${r.placa||'—'}</td><td>${r.pesoEmpresa!=null?fmt(r.pesoEmpresa,0)+' kg':'—'}</td>
            <td>${r.pesoNosso!=null?fmt(r.pesoNosso,0)+' kg':'sem pesagem aqui'}</td>
            <td>${r.diferenca!=null?fmt(r.diferenca,0)+' kg':'—'}</td>
            <td>${r.status==='ok'?'<span class="tag ok">confere</span>':r.status==='divergente'?'<span class="tag pending">divergente</span>':'<span class="tag muted">não encontrado</span>'}</td>
          </tr>`).join('')}
        </tbody>
      </table></div>
    </div>` : `<div class="empty-state"><div class="icon">📄</div>Importe um romaneio da empresa para ver o comparativo.</div>`}
  `;
  document.getElementById('btnImportConciliacao').addEventListener('click', ()=>document.getElementById('importConciliacaoInput').click());
  document.getElementById('importConciliacaoInput').addEventListener('change', (e)=>{
    if(e.target.files[0]) handleImportConciliacao(e.target.files[0]);
    e.target.value = '';
  });
}
function handleImportConciliacao(file){
  const reader = new FileReader();
  reader.onload = (ev)=>{
    try{
      const wb = XLSX.read(ev.target.result, {type:'array', cellDates:true});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:null});
      if(!rows.length){ toast('Não encontrei linhas nessa planilha.', true); return; }
      const headers = Object.keys(rows[0]);
      const keyNF = findKey(headers, ['nf']) || findKey(headers, ['nota']) || findKey(headers, ['numero']);
      const keyPlaca = findKey(headers, ['placa']);
      const keyPeso = findKey(headers, ['peso','liquido']) || findKey(headers, ['peso']);
      if(!keyNF && !keyPlaca){ toast('Não consegui identificar as colunas de NF/placa nessa planilha.', true); return; }

      conciliacaoResultado = rows.map(row=>{
        const nrNF = keyNF ? row[keyNF] : null;
        const placa = keyPlaca ? String(row[keyPlaca]||'').trim().toUpperCase() : '';
        const pesoEmpresa = keyPeso ? num(row[keyPeso]) : null;

        let e = null;
        if(nrNF){
          e = state.entregas.find(x=>x.nrNFRemessa && String(x.nrNFRemessa)===String(nrNF));
          if(!e){ const v = state.vendas.find(v=>String(v.nrNF)===String(nrNF)); if(v) e = state.entregas.find(x=>x.vendaId===v.id); }
        }
        if(!e && placa){ e = state.entregas.find(x=>x.placa===placa && x.status!=='pendente'); }

        const pesoNosso = e && e.status!=='pendente' ? (e.pesoLiquidoSemDesc || e.pesoBruto || null) : null;
        let status = 'nao_encontrado';
        let diferenca = null;
        if(e && pesoNosso!=null && pesoEmpresa!=null){
          diferenca = pesoEmpresa - pesoNosso;
          status = Math.abs(diferenca) <= 50 ? 'ok' : 'divergente';
        } else if(e){
          status = 'divergente'; // achamos a carga, mas ainda não temos peso nosso pra comparar
        }
        return { nrNF, placa, pesoEmpresa, pesoNosso, diferenca, status };
      });
      renderConciliacao();
      toast(`Conciliação: ${conciliacaoResultado.length} linha(s) comparada(s).`);
    }catch(err){
      console.error(err);
      toast('Não foi possível ler essa planilha de conciliação.', true);
    }
  };
  reader.readAsArrayBuffer(file);
}

      quando ultrapassa o percentual configurado (padrão 75%) e quando chega a 100% (contrato finalizado). Prazo de entrega e

function updateTbodyContratos(){
  const filters = getFilterValues('contratos');
  const saldos = calcSaldos();
  const rows = saldos.map(s=>{
    const cons = calcConsumoContrato(s.contrato);
    const prazos = calcPrazosContrato(s.contrato);
    const tagClass = cons.status==='finalizado' ? 'neg' : (cons.status==='atencao' ? 'pending' : 'ok');
    const consumoKgTxt = s.contrato.volumeKg
      ? `<span class="tag ${tagClass}">${fmt(cons.consumidoKg,0)} / ${fmt(cons.volumeKg,0)} kg (${fmt(cons.percentual)}%)</span>`
      : '<span class="small-note">sem volume em kg</span>';
    const extract = {
      tipo: s.contrato.tipo, empresa: empresaNome(s.contrato.empresaId), produtor: produtorNome(s.contrato.produtorId),
      doc: s.contrato.doc, volume: s.isVenda?fmt(s.volume):'', entregues: fmt(s.scsEntregues), saldo: fmt(s.saldo),
      consumoKg: cons.status, entrega: prazos.entrega.status, pagamento: prazos.pagamento.status
    };
    const html = `<tr>
      <td>${extract.tipo}</td><td>${extract.empresa}</td><td>${extract.produtor}</td>
      <td class="mono" style="font-size:11.5px">${extract.doc}</td>
      <td>${s.isVenda ? fmt(s.volume) : '—'}</td><td>${fmt(s.scsEntregues)}</td><td>${saldoTag(s)}</td>
      <td>${consumoKgTxt}</td><td>${tagPrazo(prazos.entrega)}</td><td>${tagPrazo(prazos.pagamento)}</td>
      <td><div class="actions-row">
        <button class="btn ghost sm" onclick="openCadastroModal('contrato','${s.contrato.id}')">Editar</button>
        <button class="btn danger sm" onclick="deleteContrato('${s.contrato.id}')">Excluir</button>
      </div></td>
    </tr>`;
    return {extract, html};
  }).filter(r=>rowMatches(r.extract, filters));
  document.getElementById('tbody-contratos').innerHTML = rows.length ? rows.map(r=>r.html).join('') : emptyRow(11,'Nenhum contrato encontrado.');
}
Object.assign(TBODY_UPDATERS, { contratos: updateTbodyContratos });

function saldoTag(s){
  if(s.isVenda){
    if(s.saldo < -0.5) return `<span class="tag pending">-${fmt(Math.abs(s.saldo))} (falta entregar)</span>`;
    if(s.saldo > 0.5) return `<span class="tag ok">+${fmt(s.saldo)} (excedente)</span>`;
    return `<span class="tag ok">cumprido</span>`;
  }
  return `<span class="tag muted">${fmt(s.saldo)} sc</span>`;
}

  document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click', ()=>switchTab(b.dataset.tab)));
  document.getElementById('modalCadastroClose').addEventListener('click', closeCadastroModal);
  document.getElementById('modalCadastro').addEventListener('click', (e)=>{ if(e.target.id==='modalCadastro') closeCadastroModal(); });
  document.getElementById('modalCargaClose').addEventListener('click', closeCargaModal);
  document.getElementById('modalCarga').addEventListener('click', (e)=>{ if(e.target.id==='modalCarga') closeCargaModal(); });
  document.getElementById('importInput').addEventListener('change', (e)=>{ if(e.target.files.length) abrirSelecaoColheitaImportacao(e.target.files[0]); e.target.value=''; });

  // Menu flutuante "Interações"
  const toggleBtn = document.getElementById('btnInteracoesToggle');
  const panel = document.getElementById('interacoesPanel');
  toggleBtn.addEventListener('click', (e)=>{ e.stopPropagation(); panel.classList.toggle('aberto'); });
  document.addEventListener('click', (e)=>{
    if(panel.classList.contains('aberto') && !panel.contains(e.target) && e.target!==toggleBtn){
      panel.classList.remove('aberto');
    }
  });
  document.getElementById('btnImport').addEventListener('click', ()=>{ panel.classList.remove('aberto'); document.getElementById('importInput').click(); });
  document.getElementById('btnExport').addEventListener('click', ()=>{ panel.classList.remove('aberto'); exportToXlsx(); });
  document.getElementById('btnVincularPlanilha').addEventListener('click', ()=>{ panel.classList.remove('aberto'); openCadastroModal('guiaPlanilha'); });
  document.getElementById('btnGerarDashboard').addEventListener('click', ()=>{ panel.classList.remove('aberto'); switchTab('dashboard'); window.scrollTo({top:0, behavior:'smooth'}); });
  document.getElementById('btnSalvarComplementares').addEventListener('click', async ()=>{
    panel.classList.remove('aberto');
    await saveCadastros();
    toast('Informações complementares salvas (cultura, colheitas, produtores, venda/armazenagem, contratos e motoristas).');
  });
  document.getElementById('btnLinkProdutor').addEventListener('click', ()=>{
    panel.classList.remove('aberto');
    const url = location.origin + location.pathname;
    navigator.clipboard?.writeText(url).then(()=>{
      toast('Link copiado! O produtor acessa esse mesmo link e faz login com o usuário e senha dele.');
    }).catch(()=>{
      prompt('Copie o link abaixo e envie para o produtor:', url);
    });
  });
  document.getElementById('btnToggleTema').addEventListener('click', ()=>{ panel.classList.remove('aberto'); toggleTema(); });
}
bindShellEvents();
function toggleTema(){
  document.body.classList.toggle('tema-claro');
  const claro = document.body.classList.contains('tema-claro');
  localStorage.setItem('brc_tema', claro ? 'claro' : 'escuro');
  toast(claro ? 'Tema claro ativado.' : 'Tema escuro ativado.');
}
if(localStorage.getItem('brc_tema')==='claro') document.body.classList.add('tema-claro');

    const culturaAtivaForm = state.culturas.find(c=>c.nome===state.config.cultura);
    const numero = t ? (state.colheitas.findIndex(x=>x.id===t.id)+1) : (state.colheitas.length+1);
    title.textContent = t ? `Editar colheita nº ${numero}` : `Nova colheita — nº ${numero}`;
    body.innerHTML = `
      <div class="form-grid">
        <div class="field full"><label>Cultura</label><input value="${culturaAtivaForm?culturaAtivaForm.nome:'defina a cultura ativa acima'}" disabled></div>
        <div class="field full">
          <label>Variedade</label>
          <div class="actions-row" style="gap:6px;">
            <select id="fColheitaVariedade" style="flex:1;">${optionsVariedades(culturaAtivaForm, t?.variedadeId)}</select>
            <input type="text" id="fColheitaNovaVariedade" placeholder="nova variedade" class="mini-input" style="width:110px;">
            <button type="button" class="btn ghost sm" onclick="adicionarVariedadeNaColheita()">+</button>
          </div>
        </div>
        <div class="field"><label>Hectares</label><input id="fColheitaArea" type="number" step="0.1" value="${t?.area||''}" placeholder="Ex: 120"></div>
        <div class="field"><label>Número do talhão</label><input id="fColheitaTalhao" value="${t?.talhao||''}" placeholder="Ex: Talhão 3"></div>
        <div class="field full"><label>Produtor <span class="small-note">(opcional)</span></label><select id="fColheitaProdutor">${optionsProdutores(t?.produtorId)}</select></div>
      </div>
      <div class="actions-row" style="justify-content:flex-end;margin-top:10px;">
        <button class="btn ghost" onclick="closeCadastroModal()">Cancelar</button>
        <button class="btn" onclick="salvarColheita()">Salvar</button>
      </div>`;
  }

  overlay.classList.remove('hidden');
}

function optionsCulturas(selectedId){

function maskMilhar(el){
  const digits = el.value.replace(/\D/g,'');
  el.value = digits ? Number(digits).toLocaleString('pt-BR') : '';
}
function fmtMoedaContrato(n, moeda){
  const simbolo = moeda==='USD' ? 'US$ ' : 'R$ ';
  return simbolo + (n||0).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function updateContratoSacasPreview(){
  const volumeKg = num(document.getElementById('fContratoVolumeKg').value);
  const valorKg = num(document.getElementById('fContratoValorKg').value);
  const moeda = document.getElementById('fContratoMoeda').value;
  document.getElementById('fContratoVolumeSacas').value = volumeKg ? fmtInt(volumeKg/60) : '';

function refreshProdutoresSelect(){

function salvarEmpresa(){

  const id = overlay.dataset.id;

function salvarCompletarVenda(){
  const overlay = document.getElementById('modalCadastro');
  const id = overlay.dataset.id;
  const venda = state.vendas.find(v=>v.id===id);
  if(!venda) return;
  const empresaId = document.getElementById('fCompletarEmpresa').value;
  const produtorId = document.getElementById('fCompletarProdutor').value;
  const contratoId = document.getElementById('fCompletarContrato').value || null;

function salvarColheitaDaVenda(){

  if(!venda) return;

function salvarContrato(){
  const tipo = document.getElementById('fContratoTipo').value;
  const culturaId = document.getElementById('fContratoCultura').value || null;
  const empresaId = document.getElementById('fContratoEmpresa').value;
  const produtorId = document.getElementById('fContratoProdutor').value;
  const doc = document.getElementById('fContratoDoc').value.trim();
  const moeda = document.getElementById('fContratoMoeda').value;
  const volumeKg = num(document.getElementById('fContratoVolumeKg').value);
  const valorKg = num(document.getElementById('fContratoValorKg').value);
  const volumeSacas = num(document.getElementById('fContratoVolumeSacas').value);
  const valorSaca = num(document.getElementById('fContratoValorSaca').value);
  const alertaPercentual = num(document.getElementById('fContratoAlerta').value) || 75;
  const dataInicioEntrega = document.getElementById('fContratoDataInicio').value || '';
  const dataFinalEntrega = document.getElementById('fContratoDataFinal').value || '';
  const dataPagamento = document.getElementById('fContratoDataPagamento').value || '';
  const obs = document.getElementById('fContratoObs').value.trim();
  if(!empresaId || !produtorId){ toast('Selecione empresa e produtor.', true); return; }
  if(!doc){ toast('Informe o número do contrato/negociação.', true); return; }
  if(dataInicioEntrega && dataFinalEntrega && dataFinalEntrega < dataInicioEntrega){
    toast('A data final da entrega não pode ser antes da data de início.', true); return;
  }
  const overlay = document.getElementById('modalCadastro');
  const id = overlay.dataset.id;
  const dados = {tipo, culturaId, empresaId, produtorId, doc, moeda, volumeKg, valorKg, volumeSacas, valorSaca, alertaPercentual, dataInicioEntrega, dataFinalEntrega, dataPagamento, obs};
  if(id){
    const c = state.contratos.find(x=>x.id===id);
    Object.assign(c, dados);
  } else {
    state.contratos.push({id: uid('ctr'), ...dados});
  }
  saveCadastros(); renderAll(); closeCadastroModal(); toast('Contrato salvo.');
}
function salvarMotorista(){
  const nome = document.getElementById('fMotoristaNome').value.trim();
  const placa = document.getElementById('fMotoristaPlaca').value.trim().toUpperCase();
  if(!nome){ toast('Informe o nome do motorista.', true); return; }

  const id = overlay.dataset.id;

}

function adicionarVariedadeNaColheita(){
  const nome = document.getElementById('fColheitaNovaVariedade').value.trim();

  const variedadeId = document.getElementById('fColheitaVariedade').value || null;
  const area = num(document.getElementById('fColheitaArea').value);
  const talhao = document.getElementById('fColheitaTalhao').value.trim();

  const culturaId = state.culturas.find(c=>c.nome===state.config.cultura)?.id || null;

  const dados = {culturaId, variedadeId, area, talhao, produtorId};
  if(id){ const t = state.colheitas.find(x=>x.id===id); Object.assign(t, dados); }

/* ============================================================
   MODAL DE ENTREGA — vincula a uma VENDA (existente ou nova),
   com REMESSA opcional (repasse) e dados de ROMANEIO/pesagem.
   ============================================================ */

let entregaModalState = { id:null, vendaId:null, mode:'novaEntregaComVenda', tipoLancamento:'completo' };

function openEntregaModal(id, opts){
  opts = opts || {};
  const entrega = id ? state.entregas.find(e=>e.id===id) : null;
  let mode;
  if(entrega){ mode = opts.completar && entrega.status==='pendente' ? 'completarPesagem' : 'editar'; }
  else if(opts.vendaId){ mode = 'novaEntregaParaVenda'; }
  else { mode = 'novaEntregaComVenda'; }

  entregaModalState = { id: id||null, vendaId: entrega ? entrega.vendaId : (opts.vendaId||null), mode, tipoLancamento:'completo' };
  document.getElementById('modalCargaTitle').textContent =
    mode==='completarPesagem' ? 'Lançar pesagem do romaneio' :
    mode==='editar' ? 'Editar entrega' : 'Nova entrega / romaneio';
  renderEntregaForm(entrega);
  document.getElementById('modalCarga').classList.remove('hidden');
}
function closeCargaModal(){ document.getElementById('modalCarga').classList.add('hidden'); }

function optionsVendas(selectedId){
  const opts = state.vendas.slice().sort((a,b)=>(b.dataNF||'').localeCompare(a.dataNF||'')).map(v=>
    `<option value="${v.id}" ${v.id===selectedId?'selected':''}>NF ${v.nrNF} — ${produtorNome(v.produtorId)} — ${empresaNome(v.empresaId)}</option>`
  ).join('');
  return `<option value="">— selecionar venda —</option><option value="__nova__">➕ Cadastrar nova venda agora</option>${opts}`;
}

function renderEntregaForm(entrega){
  const body = document.getElementById('modalCargaBody');
  const mode = entregaModalState.mode;
  const isNovoLivre = mode==='novaEntregaComVenda';
  const isNovoParaVenda = mode==='novaEntregaParaVenda';
  const isCompletarPesagem = mode==='completarPesagem';
  const isEditar = mode==='editar';
  const precisaEscolherTipo = isNovoLivre || isNovoParaVenda;

  let html = '';

  if(precisaEscolherTipo){
    html += `
      <div class="field">
        <label>Tipo de lançamento</label>
        <select id="fEntregaTipoLancamento" onchange="onTipoLancamentoChange()">
          <option value="completo">Já tenho os dados do romaneio (pesagem)</option>
          <option value="pendente">Só registrar a remessa/entrega — pesagem chega depois</option>
        </select>
      </div>`;
  }

  // VENDA
  if(isNovoLivre){
    html += `
      <div class="field">
        <label>Venda</label>
        <select id="fEntregaVendaSelect" onchange="onVendaSelectChange()">${optionsVendas()}</select>
      </div>
      <div id="novaVendaFieldsWrap" style="display:none;">
        <div class="section-title">Nova venda</div>
        <div class="form-grid">
          <div class="field"><label>Empresa</label><select id="fNovaVendaEmpresa" onchange="onNovaVendaEmpresaChange()">${optionsEmpresas()}</select></div>
          <div class="field"><label>Produtor</label><select id="fNovaVendaProdutor">${optionsProdutores()}</select></div>
          <div class="field"><label>Contrato</label><select id="fNovaVendaContrato">${optionsContratosDoProdutor()}</select></div>
          <div class="field"><label>Nº NF Venda</label><input id="fNovaVendaNF"></div>
          <div class="field"><label>Data da NF</label><input type="date" id="fNovaVendaData" value="${todayISO()}"></div>
          <div class="field"><label>Peso fiscal (kg)</label><input type="number" id="fNovaVendaPesoFiscal" value="${PESO_FISCAL_PADRAO}"></div>
          <div class="field"><label>Valor fiscal (R$)</label><input type="number" id="fNovaVendaValorFiscal"></div>
        </div>
      </div>`;
  } else {
    const v = vendaById(entregaModalState.vendaId);
    html += `
      <div class="field full">
        <label>Venda</label>
        <div class="pill" style="width:fit-content;background:var(--bg-2);border:1px solid var(--line);border-radius:20px;padding:5px 12px;font-size:12px;">
          NF ${v?v.nrNF:'—'} · ${v?produtorNome(v.produtorId):'—'} · ${v?empresaNome(v.empresaId):'—'}
        </div>
      </div>`;
  }

  // DROPZONE (foto do romaneio/remessa)
  html += `
    <div class="dropzone" id="dropzoneRomaneio">
      <input type="file" id="fotoRomaneioInput" accept="image/*" capture="environment">
      <div class="icon">📷</div>
      <div><b>Envie a foto do romaneio</b> — a IA lê e preenche os campos abaixo</div>
      <small>Arraste, cole (Ctrl+V) ou clique para escolher • usada só para leitura, não é salva</small>
    </div>
    <div id="ocrStatusWrap"></div>
  `;

  // REMESSA + MOTORISTA + ROMANEIO (sempre visíveis — mesmo em lançamentos "pendentes", já pode se saber quem é o motorista)
  html += `<div class="form-grid">
    <div class="field full">
      <label><input type="checkbox" id="fEntregaTemRemessa" style="width:auto;display:inline-block;margin-right:6px;" onchange="onTemRemessaChange()" ${entrega?.temRemessa?'checked':''}> Houve repasse (NF de remessa) para outra empresa?</label>
    </div>
    <div class="field" id="fNFRemessaWrap"><label>Nº NF Remessa</label><input id="fEntregaNFRemessa" value="${entrega?.nrNFRemessa||''}"></div>
    <div class="field" id="fEmpresaDestinoWrap"><label>Empresa de destino final</label><select id="fEntregaEmpresaDestino">${optionsEmpresas(entrega?.empresaDestinoId)}</select></div>
    <div class="field full"><label>Motorista cadastrado</label><select id="fCargaMotoristaSelect" onchange="onMotoristaSelectChange()">${optionsMotoristas()}</select></div>
    <div class="field"><label>Motorista</label><input id="fEntregaMotorista" value="${entrega?.motorista||''}"></div>
    <div class="field"><label>Placa</label><input id="fEntregaPlaca" value="${entrega?.placa||''}"></div>
    <div class="field"><label>Nº Romaneio</label><input id="fEntregaRomaneio" value="${entrega?.nrRomaneio||''}"></div>
    <div class="field"><label>Data de saída</label><input type="date" id="fEntregaDataSaida" value="${entrega?.dataSaida||todayISO()}"></div>
  </div>`;

  // PESAGEM (só quando tipoLancamento = completo)
  html += `<div class="form-grid">
      <div class="field" data-completo-only><label>Peso fiscal (kg)</label><input type="number" id="fEntregaPesoFiscal" value="${entrega?.pesoFiscal ?? PESO_FISCAL_PADRAO}" oninput="updateComputedPreview()"></div>
      <div class="field" data-completo-only><label>Peso bruto (kg)</label><input type="number" id="fEntregaPesoBruto" value="${entrega?.pesoBruto ?? ''}" oninput="updateComputedPreview()"></div>
      <div class="field" data-completo-only><label>Umidade — desconto (kg)</label><input type="number" id="fEntregaUmidade" value="${entrega?.umidade ?? 0}" oninput="updateComputedPreview()"></div>
      <div class="field" data-completo-only><label>Impureza — desconto (kg)</label><input type="number" id="fEntregaImpureza" value="${entrega?.impureza ?? 0}" oninput="updateComputedPreview()"></div>
      <div class="field" data-completo-only><label>Ardido/avariado — desconto (kg)</label><input type="number" id="fEntregaArdido" value="${entrega?.ardido ?? 0}" oninput="updateComputedPreview()"></div>
      <div class="field" data-completo-only><label>Taxa de recebimento (kg)</label><input type="number" id="fEntregaTx" value="${entrega?.txRecebimento ?? 0}" oninput="updateComputedPreview()"></div>
      <div class="field" data-completo-only><label>Peso líquido do romaneio (kg)</label><input type="number" id="fEntregaPesoLiquido" value="${entrega?.pesoLiquidoComDesc ?? ''}" oninput="updateComputedPreview()"></div>
      <div class="field" data-completo-only><label>Preço frete (R$/sc bruto)</label><input type="number" id="fEntregaPrecoFrete" value="${entrega?.precoFrete ?? ''}" oninput="updateComputedPreview()"></div>
  </div>
  <div class="section-title" data-completo-only>Calculado automaticamente</div>
  <div class="grid cols-4" data-completo-only>
    <div class="field"><label>Peso líq. sem desc.</label><input class="computed" disabled id="calcPesoLiqSemDesc" value="0"></div>
    <div class="field"><label>Scs bruto</label><input class="computed" disabled id="calcScsBruto" value="0"></div>
    <div class="field"><label>Scs líquido</label><input class="computed" disabled id="calcScsLiquido" value="0"></div>
    <div class="field"><label>Valor frete</label><input class="computed" disabled id="calcValorFrete" value="R$ 0,00"></div>
  </div>

  <div class="actions-row" style="justify-content:flex-end;margin-top:16px;">
    <button class="btn ghost" onclick="closeCargaModal()">Cancelar</button>
    <button class="btn" onclick="salvarEntrega()">Salvar</button>
  </div>`;

  body.innerHTML = html;
  bindDropzone();
  onTemRemessaChange();
  if(precisaEscolherTipo) onTipoLancamentoChange();
  updateComputedPreview();
}

function onVendaSelectChange(){
  const val = document.getElementById('fEntregaVendaSelect').value;
  document.getElementById('novaVendaFieldsWrap').style.display = val==='__nova__' ? '' : 'none';
}
function onNovaVendaEmpresaChange(){
  document.getElementById('fNovaVendaProdutor').innerHTML = optionsProdutores();
}
function onTemRemessaChange(){
  const checked = document.getElementById('fEntregaTemRemessa')?.checked;
  const show = !!checked;
  const wrap1 = document.getElementById('fNFRemessaWrap'), wrap2 = document.getElementById('fEmpresaDestinoWrap');
  if(wrap1) wrap1.style.display = show ? '' : 'none';
  if(wrap2) wrap2.style.display = show ? '' : 'none';

function onMotoristaSelectChange(){
  const id = document.getElementById('fCargaMotoristaSelect').value;
  if(!id) return;
  const m = motoristaById(id);
  if(m){
    document.getElementById('fEntregaMotorista').value = m.nome;
    document.getElementById('fEntregaPlaca').value = m.placa || '';
  }
}
function onTipoLancamentoChange(){
  const sel = document.getElementById('fEntregaTipoLancamento');
  const tipo = sel ? sel.value : 'completo';
  entregaModalState.tipoLancamento = tipo;
  const show = tipo === 'completo';
  document.querySelectorAll('[data-completo-only]').forEach(elm => elm.style.display = show ? '' : 'none');
}

/* ---------------- DROPZONE + OCR ---------------- */
function bindDropzone(){
  const dz = document.getElementById('dropzoneRomaneio');
  if(!dz) return;
  const input = document.getElementById('fotoRomaneioInput');
  dz.addEventListener('click', ()=>input.click());
  ['dragover','dragenter'].forEach(evt=>dz.addEventListener(evt, e=>{ e.preventDefault(); dz.classList.add('drag'); }));
  ['dragleave','drop'].forEach(evt=>dz.addEventListener(evt, e=>{ e.preventDefault(); dz.classList.remove('drag'); }));
  dz.addEventListener('drop', e=>{ if(e.dataTransfer.files.length) handleRomaneioFile(e.dataTransfer.files[0]); });
  input.addEventListener('change', e=>{ if(e.target.files.length) handleRomaneioFile(e.target.files[0]); });
  document.addEventListener('paste', pasteHandler);
}
function pasteHandler(e){
  const overlay = document.getElementById('modalCarga');
  const motoristaPage = document.getElementById('motoristaFormWrap');
  const inMotoristaPage = motoristaPage && motoristaPage.style.display !== 'none';
  if(overlay && overlay.classList.contains('hidden') && !inMotoristaPage) return;
  const items = e.clipboardData?.items || [];
  for(const it of items){
    if(it.type.startsWith('image/')){ handleRomaneioFile(it.getAsFile()); break; }
  }
}

async function handleRomaneioFile(file){
  const statusWrap = document.getElementById('ocrStatusWrap');
  const reader = new FileReader();
  reader.onload = () => {
    statusWrap.innerHTML = `<img class="thumb-preview" src="${reader.result}">` + statusWrap.innerHTML;
  };
  reader.readAsDataURL(file);

  statusWrap.innerHTML = `<div class="ocr-status"><div class="spinner"></div> Lendo romaneio com IA...</div>`;
  try{
    const parsed = await ocrRomaneio(file);
    applyOcrToForm(parsed);
    statusWrap.innerHTML = `<div class="ocr-status" style="color:var(--lime)">✓ Romaneio lido — confira os campos antes de salvar</div>` + statusWrap.innerHTML;
  }catch(err){
    statusWrap.innerHTML = `<div class="ocr-status" style="color:var(--red)">⚠ ${err.message}. Preencha manualmente.</div>` + statusWrap.innerHTML;
  }
  const camposWrap = document.getElementById('motoristaCamposWrap');
  if(camposWrap){
    camposWrap.style.display = '';
    camposWrap.scrollIntoView({behavior:'smooth', block:'start'});
  }
  const toggleWrap = document.getElementById('motoristaManualToggleWrap');
  if(toggleWrap) toggleWrap.style.display = 'none';
  const placaTopo = document.getElementById('fMotoristaPlacaAtual');
  const fPlaca = document.getElementById('fEntregaPlaca');
  if(placaTopo && fPlaca && !fPlaca.value) fPlaca.value = placaTopo.value;
}

function mostrarCamposManual(){
  const camposWrap = document.getElementById('motoristaCamposWrap');
  if(camposWrap){
    camposWrap.style.display = '';
    camposWrap.scrollIntoView({behavior:'smooth', block:'start'});
  }

  if(toggleWrap) toggleWrap.style.display = 'none';

  const fPlaca = document.getElementById('fEntregaPlaca');
  if(placaTopo && fPlaca && !fPlaca.value) fPlaca.value = placaTopo.value;
}

function applyOcrToForm(p){
  if(p.nrNFRemessa){
    const chk = document.getElementById('fEntregaTemRemessa');
    if(chk){ chk.checked = true; onTemRemessaChange(); }
    setVal('fEntregaNFRemessa', p.nrNFRemessa);
  }
  if(p.empresaNome){
    const match = state.empresas.find(e=>stripAccents(e.nome)===stripAccents(p.empresaNome) || stripAccents(e.nome).includes(stripAccents(p.empresaNome)));
    if(match){
      const vendaId = entregaModalState.vendaId;
      const v = vendaId ? vendaById(vendaId) : null;
      if(!v || match.id !== v.empresaId){
        const chk = document.getElementById('fEntregaTemRemessa');
        if(chk){ chk.checked = true; onTemRemessaChange(); }
        const sel = document.getElementById('fEntregaEmpresaDestino');
        if(sel) sel.value = match.id;
      }
    }
  }
  if(p.motorista){
    const matchMot = state.motoristas.find(m=>stripAccents(m.nome)===stripAccents(p.motorista) || stripAccents(p.motorista).includes(stripAccents(m.nome)));
    if(matchMot){ const sel=document.getElementById('fCargaMotoristaSelect'); if(sel){ sel.value = matchMot.id; } }
  }
  setVal('fEntregaMotorista', p.motorista);
  setVal('fEntregaPlaca', p.placa);
  setVal('fEntregaRomaneio', p.nrRomaneio);
  const iso = toISODate(p.dataSaida);
  if(iso) setVal('fEntregaDataSaida', iso);
  setVal('fEntregaPesoBruto', p.pesoBruto);
  setVal('fEntregaUmidade', p.umidade);
  setVal('fEntregaImpureza', p.impureza);
  setVal('fEntregaArdido', p.ardido);
  setVal('fEntregaTx', p.txRecebimento);
  setVal('fEntregaPesoLiquido', p.pesoLiquidoComDesc);
  setVal('fEntregaPrecoFrete', p.precoFrete);

  const tipoSel = document.getElementById('fEntregaTipoLancamento');
  if(tipoSel && tipoSel.value==='pendente' && (p.nrRomaneio || p.pesoBruto)){
    tipoSel.value = 'completo';
    onTipoLancamentoChange();
  }
  updateComputedPreview();
}
function setVal(id, v){
  if(v===null||v===undefined||v==='') return;
  const el = document.getElementById(id);
  if(el) el.value = v;
}

/* ---------------- CÁLCULO AO VIVO NO FORMULÁRIO ---------------- */
function updateComputedPreview(){
  const g = id => { const el = document.getElementById(id); return el ? num(el.value) : 0; };
  const pesoBruto = g('fEntregaPesoBruto');
  const umidade = g('fEntregaUmidade'), impureza = g('fEntregaImpureza'), ardido = g('fEntregaArdido');
  const pesoLiquido = g('fEntregaPesoLiquido');
  const precoFrete = g('fEntregaPrecoFrete');

  const pesoLiqSemDesc = pesoLiquido - umidade - impureza - ardido;
  const scsBruto = pesoBruto/60;
  const scsLiquido = pesoLiqSemDesc/60;
  const valorFrete = scsBruto * precoFrete;

  setText('calcPesoLiqSemDesc', fmt(pesoLiqSemDesc,1));
  setText('calcScsBruto', fmt(scsBruto,2));
  setText('calcScsLiquido', fmt(scsLiquido,2));
  setText('calcValorFrete', fmtMoney(valorFrete));
}
function setText(id, v){ const el = document.getElementById(id); if(el) el.value = v; }

/* ---------------- SALVAR ENTREGA ---------------- */
function salvarEntrega(){
  const mode = entregaModalState.mode;
  const tipoLancamento = (mode==='completarPesagem') ? 'completo' : (document.getElementById('fEntregaTipoLancamento')?.value || 'completo');

  let entrega;
  if(mode==='editar' || mode==='completarPesagem'){
    entrega = state.entregas.find(e=>e.id===entregaModalState.id);
  } else {
    entrega = { id: uid('ent'), createdAt: new Date().toISOString() };
  }

  let vendaId = entregaModalState.vendaId;
  if(mode==='novaEntregaComVenda'){
    const sel = document.getElementById('fEntregaVendaSelect').value;
    if(sel==='__nova__'){
      const empresaId = document.getElementById('fNovaVendaEmpresa').value;
      const produtorId = document.getElementById('fNovaVendaProdutor').value;
      const nrNFVenda = document.getElementById('fNovaVendaNF').value.trim();
      if(!empresaId || !produtorId){ toast('Selecione empresa e produtor da venda.', true); return; }
      if(!nrNFVenda){ toast('Informe o número da NF de venda.', true); return; }
      const venda = {
        id: uid('venda'), empresaId, produtorId,
        contratoId: document.getElementById('fNovaVendaContrato').value || null,
        nrNF: nrNFVenda, dataNF: document.getElementById('fNovaVendaData').value || todayISO(),
        pesoFiscal: num(document.getElementById('fNovaVendaPesoFiscal').value) || PESO_FISCAL_PADRAO,
        valorFiscal: num(document.getElementById('fNovaVendaValorFiscal').value),
        chaveNFe:'', createdAt: new Date().toISOString()
      };
      state.vendas.push(venda);
      vendaId = venda.id;
    } else {
      if(!sel){ toast('Selecione uma venda.', true); return; }
      vendaId = sel;
    }
  }
  if(!vendaId){ toast('Não foi possível identificar a venda desta entrega.', true); return; }
  entrega.vendaId = vendaId;

  const temRemessa = !!document.getElementById('fEntregaTemRemessa')?.checked;
  entrega.temRemessa = temRemessa;
  entrega.nrNFRemessa = temRemessa ? document.getElementById('fEntregaNFRemessa').value.trim() : '';
  entrega.empresaDestinoId = temRemessa ? (document.getElementById('fEntregaEmpresaDestino').value || null) : null;

  entrega.motorista = document.getElementById('fEntregaMotorista').value.trim();
  entrega.placa = document.getElementById('fEntregaPlaca').value.trim();
  entrega.nrRomaneio = document.getElementById('fEntregaRomaneio').value.trim();
  entrega.dataSaida = document.getElementById('fEntregaDataSaida').value || todayISO();

  if(tipoLancamento==='completo'){
    entrega.pesoFiscal = document.getElementById('fEntregaPesoFiscal').value;
    entrega.pesoBruto = document.getElementById('fEntregaPesoBruto').value;
    entrega.umidade = document.getElementById('fEntregaUmidade').value;
    entrega.impureza = document.getElementById('fEntregaImpureza').value;
    entrega.ardido = document.getElementById('fEntregaArdido').value;
    entrega.txRecebimento = document.getElementById('fEntregaTx').value;
    entrega.pesoLiquidoComDesc = document.getElementById('fEntregaPesoLiquido').value;
    entrega.precoFrete = document.getElementById('fEntregaPrecoFrete').value;
    if(!entrega.pesoBruto || !entrega.pesoLiquidoComDesc){
      toast('Preencha ao menos o peso bruto e o peso líquido do romaneio.', true); return;
    }
    recalcEntrega(entrega);
    if(mode!=='editar'){ entrega.status = 'completo'; }
  } else {
    entrega.status = 'pendente';
  }
  entrega.updatedAt = new Date().toISOString();

  if(mode!=='editar' && mode!=='completarPesagem'){ state.entregas.push(entrega); }
  saveCadastros(); saveVendas(); saveEntregas();
  renderAll();
  closeCargaModal();
  toast(entrega.status==='completo' ? 'Entrega lançada com sucesso.' : 'Entrega registrada como pendente de pesagem.');
}

function normalizarPlaca(v){ return String(v||'').toUpperCase().replace(/[^A-Z0-9]/g,''); }

  const v = document.getElementById('fMotoristaPlacaAtual').value;

  if(fPlaca && !fPlaca.value) fPlaca.value = v;
  if(document.getElementById('motTabCargas').style.display !== 'none') renderMinhasCargas();

function motoristaSwitchTab(tab){
  const btnEnviar = document.getElementById('motTabBtnEnviar');
  const btnCargas = document.getElementById('motTabBtnCargas');
  btnEnviar.style.background = tab==='enviar' ? 'var(--gold)' : 'transparent';

  btnCargas.style.background = tab==='cargas' ? 'var(--gold)' : 'transparent';

}
function renderMinhasCargas(){
  const placaAtual = normalizarPlaca(document.getElementById('fMotoristaPlacaAtual').value);
  const wrap = document.getElementById('motTabCargas');
  if(!placaAtual){
    wrap.innerHTML = `<div class="empty-state"><div class="icon">🚚</div>Informe a placa do caminhão acima para ver as cargas enviadas por ele.</div>`;
    return;
  }
  const minhas = state.entregas
    .filter(e=>normalizarPlaca(e.placa)===placaAtual)
    .sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  if(!minhas.length){
    wrap.innerHTML = `<div class="empty-state"><div class="icon">🚚</div>Nenhuma carga encontrada ainda para a placa ${placaAtual}.</div>`;
    return;
  }
  wrap.innerHTML = minhas.map(e=>{
    const v = vendaById(e.vendaId);
    const pesoLiq = e.pesoLiquidoComDesc || e.pesoLiquidoSemDesc || 0;
    const podecancelar = e.status==='aguardando_conferencia';
    return `
      <div class="card" style="margin-bottom:10px;padding:14px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
          <div>
            <div style="font-weight:700;">Romaneio ${e.nrRomaneio||'—'}</div>

          ${statusTag(e.status)}

        ${podecancelar ? `<button class="btn ghost sm" style="margin-top:10px;" onclick="cancelarCargaMotorista('${e.id}')">Cancelar envio</button>` : ''}
      </div>`;
  }).join('');
}

  state.entregas = state.entregas.filter(e=>e.id!==entregaId);
  await saveEntregas();
  renderMinhasCargas();
  toast('Envio cancelado.');
}

function buscarNFMotorista(){
  const valor = document.getElementById('mBuscaNF').value.trim();
  const info = document.getElementById('motoristaVendaInfo');
  const fallback = document.getElementById('motoristaFallbackSelects');
  if(!valor){ info.innerHTML=''; fallback.style.display='none'; motoristaLink={tipo:null}; return; }

  const entregaExistente = state.entregas.find(e=>e.nrNFRemessa && String(e.nrNFRemessa)===valor && e.status!=='completo');
  if(entregaExistente){
    const v = vendaById(entregaExistente.vendaId);
    motoristaLink = { tipo:'entrega', entregaId: entregaExistente.id, vendaId: entregaExistente.vendaId };
    info.innerHTML = `<div class="ocr-status" style="color:var(--lime)">✓ Remessa encontrada: NF ${v?.nrNF} · ${v?produtorNome(v.produtorId):''} · destino ${empresaNome(entregaExistente.empresaDestinoId)}</div>`;
    fallback.style.display = 'none';
    return;
  }
  const venda = state.vendas.find(v=>String(v.nrNF)===valor);
  if(venda){
    motoristaLink = { tipo:'venda', vendaId: venda.id };
    info.innerHTML = `<div class="ocr-status" style="color:var(--lime)">✓ Venda encontrada: ${produtorNome(venda.produtorId)} · ${empresaNome(venda.empresaId)}</div>`;
    fallback.style.display = 'none';
    return;
  }
  motoristaLink = { tipo:'novo' };
  info.innerHTML = `<div class="ocr-status" style="color:var(--gold)">NF não encontrada — selecione a empresa e o produtor abaixo</div>`;
  fallback.style.display = '';
}

function submitMotorista(){
  if(!motoristaLink.tipo){ toast('Informe e busque o número da NF antes de enviar.', true); return; }
  const pesoBruto = document.getElementById('fEntregaPesoBruto').value;
  const pesoLiquido = document.getElementById('fEntregaPesoLiquido').value;
  if(!pesoBruto || !pesoLiquido){ toast('Preencha o peso bruto e o peso líquido (ou tire a foto novamente).', true); return; }

  const camposComuns = {
    motorista: document.getElementById('fEntregaMotorista').value.trim(),
    placa: document.getElementById('fEntregaPlaca').value.trim(),
    nrRomaneio: document.getElementById('fEntregaRomaneio').value.trim(),
    dataSaida: document.getElementById('fEntregaDataSaida').value || todayISO(),
    pesoFiscal: document.getElementById('fEntregaPesoFiscal').value,
    pesoBruto, umidade: document.getElementById('fEntregaUmidade').value,
    impureza: document.getElementById('fEntregaImpureza').value,
    ardido: document.getElementById('fEntregaArdido').value,
    txRecebimento: document.getElementById('fEntregaTx').value,
    pesoLiquidoComDesc: pesoLiquido,
    precoFrete: document.getElementById('fEntregaPrecoFrete').value,
    updatedAt: new Date().toISOString(),
  };

  if(motoristaLink.tipo==='entrega'){
    const e = state.entregas.find(x=>x.id===motoristaLink.entregaId);
    Object.assign(e, camposComuns);
    recalcEntrega(e);
    e.status = 'aguardando_conferencia';
  } else {
    let vendaId = motoristaLink.vendaId;
    if(motoristaLink.tipo==='novo'){
      const empresaId = document.getElementById('fNovaVendaEmpresa').value;
      const produtorId = document.getElementById('fNovaVendaProdutor').value;
      if(!empresaId || !produtorId){ toast('Selecione empresa e produtor.', true); return; }
      const venda = {
        id: uid('venda'), empresaId, produtorId, contratoId:null,
        nrNF: document.getElementById('mBuscaNF').value.trim() || ('S/N-'+Date.now()),
        dataNF: todayISO(), pesoFiscal: PESO_FISCAL_PADRAO, valorFiscal:0, chaveNFe:'',
        createdAt: new Date().toISOString()
      };
      state.vendas.push(venda);
      vendaId = venda.id;
    }
    const entrega = Object.assign({
      id: uid('ent'), vendaId, temRemessa:false, nrNFRemessa:'', empresaDestinoId:null,
      status:'aguardando_conferencia', createdAt: new Date().toISOString(),
    }, camposComuns);
    recalcEntrega(entrega);
    state.entregas.push(entrega);
  }
  saveCadastros(); saveVendas(); saveEntregas();

  document.getElementById('motoristaFormWrap').style.display = 'none';
  const successWrap = document.getElementById('motoristaSuccessWrap');
  successWrap.style.display = '';
  successWrap.innerHTML = `
    <div class="card" style="text-align:center;">
      <div style="font-size:34px;">✅</div>

function renderProdutoresCompromissosHTML(){

        const areaTotal = talhoesP.reduce((a,t)=>a+num(t.area),0);

        return `<tr>
