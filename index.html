function calcMediaHectare(){
  const hectInput = document.getElementById('hectInput');
  const h = hectInput ? parseFloat(hectInput.value) : NaN;
  const k = window.__k;
  const elLiq = document.getElementById('mediaLiq'), elBru = document.getElementById('mediaBru');
  if(!elLiq) return;
  if(!h || h<=0 || !k){ elLiq.innerText='—'; elBru.innerText='—'; return; }
  elLiq.innerText = fmt(k.scsLiquido/h);
  elBru.innerText = fmt(k.scsBruto/h);
}

function addFittedPage(pdf, canvas, isFirst){
  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();
  const imgData = canvas.toDataURL('image/png');
  let renderWidth = pageWidth;
  let renderHeight = canvas.height * pageWidth / canvas.width;
  if(renderHeight > pageHeight){
    renderHeight = pageHeight;
    renderWidth = canvas.width * pageHeight / canvas.height;
  }
  const x = (pageWidth - renderWidth) / 2;
  const y = (pageHeight - renderHeight) / 2;
  if(!isFirst) pdf.addPage();
  pdf.addImage(imgData, 'PNG', x, y, renderWidth, renderHeight);
}

async function exportPDF(){
  const btn = document.getElementById('pdfBtn');
  const originalLabel = btn.innerHTML;
  btn.classList.add('loading'); btn.innerHTML = '⏳ Gerando PDF...';
  const pdfHeader = document.getElementById('pdfHeaderBlock');
  const pdfHeader2 = document.getElementById('pdfHeaderBlock2');
  const page1 = document.getElementById('pdfPage1');
  const page2 = document.getElementById('pdfPage2');
  pdfHeader.classList.add('show');
  pdfHeader2.classList.add('show');
  try{
    const canvas1 = await html2canvas(page1, {backgroundColor:'#0B0E0C', scale:2, useCORS:true});
    const canvas2 = await html2canvas(page2, {backgroundColor:'#0B0E0C', scale:2, useCORS:true});
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p','mm','a4');
    addFittedPage(pdf, canvas1, true);
    addFittedPage(pdf, canvas2, false);
    const fazenda = (state.config.fazenda||'fazenda').trim().replace(/\s+/g,'_') || 'fazenda';
    const safra = (state.config.safra||'safra').trim() || 'safra';
    const cultura = (state.config.cultura||'colheita').trim().replace(/\s+/g,'_') || 'colheita';
    const hoje = new Date();
    const dataStr = `${String(hoje.getDate()).padStart(2,'0')}-${String(hoje.getMonth()+1).padStart(2,'0')}-${hoje.getFullYear()}`;
    pdf.save(`relatorio_${cultura}_${safra}_${fazenda}_${dataStr}.pdf`);
  }catch(err){
    toast('Erro ao gerar o PDF: ' + err.message, true);
    console.error(err);
  }finally{
    pdfHeader.classList.remove('show');
    pdfHeader2.classList.remove('show');
    btn.classList.remove('loading'); btn.innerHTML = originalLabel;
  }
}
/* ============================================================
   IMPORTAR / EXPORTAR PLANILHA — 3 formatos reconhecidos:
   1) Legado (planilha interna antiga, NF+romaneio na mesma linha)
   2) Software de gestão — relatório de NOTAS DE VENDA
   3) Software de gestão — relatório de NOTAS DE REMESSA (repasse)
   ============================================================ */

function findKey(headers, mustInclude, mustExclude){
  mustExclude = mustExclude || [];
  return headers.find(k=>{
    const nk = stripAccents(k);
    return mustInclude.every(t=>nk.includes(t)) && !mustExclude.some(t=>nk.includes(t));
  });
}
function getOrCreateEmpresa(nome, cnpj){
  if(!nome) return null;
  cnpj = onlyDigits(cnpj);
  let e = cnpj ? state.empresas.find(x=>onlyDigits(x.cnpj)===cnpj && cnpj!=='') : null;
  if(!e) e = state.empresas.find(x=>stripAccents(x.nome)===stripAccents(nome));
  if(!e){ e = {id: uid('emp'), nome: String(nome).trim(), cnpj: cnpj||''}; state.empresas.push(e); }
  else if(cnpj && !e.cnpj){ e.cnpj = cnpj; }
  return e.id;
}
function getOrCreateProdutor(nome, doc){
  if(!nome) return null;
  const digits = onlyDigits(doc);
  const isCnpj = digits.length===14;
  let p = digits ? state.produtores.find(x=>onlyDigits(x.cpf)===digits || onlyDigits(x.cnpj)===digits) : null;
  if(!p) p = state.produtores.find(x=>stripAccents(x.nome)===stripAccents(nome));
  if(!p){
    p = { id: uid('prod'), nome: String(nome).trim(), cpf: (!isCnpj && digits) ? digits : '', cnpj: (isCnpj && digits) ? digits : '' };
    state.produtores.push(p);
  } else {
    if(digits && isCnpj && !p.cnpj) p.cnpj = digits;
    if(digits && !isCnpj && !p.cpf) p.cpf = digits;
  }
  return p.id;
}
function getOrCreateContrato(doc, tipo, empresaId, produtorId){
  if(!doc) return null;
  let c = state.contratos.find(x=>x.doc===String(doc).trim() && x.empresaId===empresaId && x.produtorId===produtorId);
  if(!c){
    c = { id: uid('ctr'), tipo: TIPOS_CONTRATO.includes(tipo) ? tipo : 'Depósito a Fixar', empresaId, produtorId, culturaId: null,
      doc: String(doc).trim(), volumeKg: 0, valorKg: 0, volumeSacas: 0, valorSaca: 0, alertaPercentual: 75, obs:'' };
    state.contratos.push(c);
  }
  return c.id;
}
function getOrCreateMotorista(nome, placa){
  if(!nome) return;
  let m = state.motoristas.find(x=>stripAccents(x.nome)===stripAccents(nome));
  if(!m){ state.motoristas.push({id: uid('mot'), nome, placa: placa||''}); }
  else if(placa && !m.placa){ m.placa = placa; }
}

/* ---------------- IMPORTAR CONTRATO FECHADO EM PDF ----------------
   Lê o texto do PDF (pdf.js), tenta identificar comprador, vendedor, volume e preço
   por palavras-chave comuns em contrato de compra e venda de grãos. A extração é uma
   sugestão — o usuário sempre confere e corrige antes de gravar na base de dados. */
let contratoPdfParsed = null;
function handleImportContratoPDF(file){
  if(!window.pdfjsLib){ toast('Biblioteca de leitura de PDF não carregou. Verifique sua conexão.', true); return; }
  const reader = new FileReader();
  reader.onload = async (ev)=>{
    try{
      const pdf = await pdfjsLib.getDocument({data: ev.target.result}).promise;
      let texto = '';
      for(let i=1;i<=pdf.numPages;i++){
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        texto += content.items.map(it=>it.str).join(' ') + ' ';
      }
      contratoPdfParsed = parseContratoPDFTexto(texto);
      openCadastroModal('importarContratoPDF', null);
    }catch(err){
      console.error(err);
      toast('Não consegui ler esse PDF. Confira se não é uma imagem escaneada sem texto.', true);
    }
  };
  reader.readAsArrayBuffer(file);
}
function parseContratoPDFTexto(textoOriginal){
  const t = String(textoOriginal||'').replace(/\s+/g,' ');
  const r = { vendedorNome:'', vendedorDoc:'', compradorNome:'', compradorDoc:'', volumeKg:0, valorKg:0, moeda:'BRL', contratoNr:'' };

  let m = t.match(/CONTRATO\s*N[ºO°]?\.?\s*[:\-]?\s*([0-9A-Za-z./-]+)/i);
  if(m) r.contratoNr = m[1];

  m = t.match(/VENDEDOR[A-Za-zÀ-ú\s]*?[:\-]\s*([^,;]{3,80}?)\s*[-,]?\s*(?:CPF|CNPJ)[:\s\/n°º.]*([\d.\/-]{11,18})/i);
  if(m){ r.vendedorNome = m[1].trim(); r.vendedorDoc = m[2].trim(); }

  m = t.match(/COMPRADOR[A-Za-zÀ-ú\s]*?[:\-]\s*([^,;]{3,80}?)\s*[-,]?\s*(?:CPF|CNPJ)[:\s\/n°º.]*([\d.\/-]{11,18})/i);
  if(m){ r.compradorNome = m[1].trim(); r.compradorDoc = m[2].trim(); }

  m = t.match(/([\d.,]{2,12})\s*(?:kg|quilos|quilogramas)/i);
  if(m) r.volumeKg = num(m[1]);
  if(!r.volumeKg){
    m = t.match(/([\d.,]{1,10})\s*sacas?/i);
    if(m) r.volumeKg = num(m[1]) * 60;
  }

  if(/US\$|D[ÓO]LAR/i.test(t)) r.moeda = 'USD';
  m = t.match(/(?:PRE[ÇC]O|VALOR)\s*(?:DO|POR)?\s*KG[:\s]*(?:R\$|US\$)?\s*([\d.,]{1,8})/i);
  if(m) r.valorKg = num(m[1]);
  if(!r.valorKg){
    m = t.match(/(?:PRE[ÇC]O|VALOR)\s*(?:DA|POR)?\s*SACA[:\s]*(?:R\$|US\$)?\s*([\d.,]{1,8})/i);
    if(m) r.valorKg = num(m[1]) / 60;
  }
  return r;
}
function confirmarImportContratoPDF(){

  const vendedorDoc = document.getElementById('fPdfVendedorDoc').value.trim();

  if(contrato){ Object.assign(contrato, dados); }

function parseMotoristaPlaca(v){
  if(!v) return {motorista:'', placa:''};
  const s = String(v).trim();
  const m = s.match(/^(.*?)[\s\-]+([A-Z]{3}\s?[0-9][A-Z0-9][0-9]{2})$/i);
  if(m) return {motorista: m[1].trim().replace(/-\s*$/,'').trim(), placa: m[2].toUpperCase().replace(/\s/g,'')};
  return {motorista: s, placa:''};
}
function parseEmpresaCompound(v){
  if(!v) return {nome:'', cnpj:''};
  const s = String(v).trim();
  const m = s.match(/^(.*?)\s*-\s*CNPJ:\s*([\d./-]+)\s*$/i);
  if(m) return {nome: m[1].trim(), cnpj: m[2].trim()};
  return {nome: s, cnpj:''};
}
function parseProdutorCompound(v){
  if(!v) return {nome:'', doc:'', ie:''};
  const s = String(v).trim();
  const m = s.match(/^(.*?)\s*-\s*CPF\/CNPJ:\s*([\d./-]+)\s*-\s*IE:\s*([\w.-]+)\s*$/i);
  if(m) return {nome: m[1].trim(), doc: m[2].trim(), ie: m[3].trim()};
  const m2 = s.match(/^(.*?)\s*-\s*CPF\/CNPJ:\s*([\d./-]+)\s*$/i);
  if(m2) return {nome: m2[1].trim(), doc: m2[2].trim(), ie:''};
  return {nome: s, doc:'', ie:''};
}
function parseClienteDestino(v){
  if(!v) return '';
  return String(v).split(',')[0].trim();
}
function inferTipoContratoPorDescricao(desc){
  const d = stripAccents(desc);
  if(d.includes('venda')) return 'Venda';
  if(d.includes('deposito') && d.includes('fixar')) return 'Depósito a Fixar';
  if(d.includes('complemento')) return 'Complemento';
  if(d.includes('deposito')) return 'Depósito';
  return 'Depósito a Fixar';
}

/* ---- Detecção de formato ---- */
function isFormatoPadraoNF(headers){
  const nk = headers.map(stripAccents);
  return nk.includes('produtor') && nk.includes('numero') && nk.some(h=>h.includes('valor total'))
    && nk.some(h=>h.includes('data emissao')) && nk.includes('operacao') && nk.includes('destinatario')
    && nk.includes('transportadora') && nk.includes('placa');
}
function isFormatoSoftwareGestaoVenda(headers){
  const nk = headers.map(stripAccents);
  return nk.includes('tipo registro') && nk.some(h=>h.includes('numero nota')) && nk.some(h=>h.includes('cliente/fornecedor') || h.includes('clientefornecedor'));
}
function isFormatoRemessa(headerRow){
  const nk = headerRow.map(h=>stripAccents(String(h||'')));
  return nk.some(h=>h.includes('transportadora')) && nk.some(h=>h==='placa') && nk.some(h=>h.includes('numero nf'));
}

/* ---- Import 0: relatório PADRÃO de NFs emitidas (formato oficial a partir de agora) ----
   Uma linha por NF, já com produtor, empresa destinatária, natureza da operação, motorista e placa.
   Cada linha vira uma venda + uma entrega (peso ainda pendente, chega depois pelo romaneio). */
function handleImportPadraoNF(rows, colheitaId){
  let novos = 0, atualizados = 0, duplicados = 0, ignoradosCancelados = 0, ignoradosSemDados = 0;
  const gruposTocados = new Set();
  const keys = {
    status: findKey(Object.keys(rows[0]), ['status']),
    produtor: findKey(Object.keys(rows[0]), ['produtor']),
    numero: findKey(Object.keys(rows[0]), ['numero']),
    valorTotal: findKey(Object.keys(rows[0]), ['valor','total']),
    dataEmissao: findKey(Object.keys(rows[0]), ['data','emissao']),
    operacao: findKey(Object.keys(rows[0]), ['operacao']),
    destinatario: findKey(Object.keys(rows[0]), ['destinatario']),
    transportadora: findKey(Object.keys(rows[0]), ['transportadora']),
    placa: findKey(Object.keys(rows[0]), ['placa']),
    observacao: findKey(Object.keys(rows[0]), ['observacao']),
  };

  rows.forEach(row=>{
    const status = keys.status ? String(row[keys.status]||'').trim() : 'Autorizada';
    if(status && stripAccents(status) !== 'autorizada'){ ignoradosCancelados++; return; }

    const nrNF = keys.numero ? row[keys.numero] : null;
    const produtorNomeRaw = keys.produtor ? String(row[keys.produtor]||'').trim() : '';
    const destinatarioRaw = keys.destinatario ? String(row[keys.destinatario]||'').trim() : '';
    if(!nrNF || !produtorNomeRaw){ ignoradosSemDados++; return; }

    const valorTotal = keys.valorTotal ? num(row[keys.valorTotal]) : 0;
    const dataEmissao = keys.dataEmissao ? toISODate(row[keys.dataEmissao]) : null;
    const operacao = keys.operacao ? String(row[keys.operacao]||'').trim() : '';
    const observacao = keys.observacao ? String(row[keys.observacao]||'') : '';
    const motorista = keys.transportadora ? String(row[keys.transportadora]||'').trim() : '';
    const placa = keys.placa ? String(row[keys.placa]||'').trim().toUpperCase() : '';

    const empresaId = destinatarioRaw ? getOrCreateEmpresa(parseClienteDestino(destinatarioRaw)) : null;
    const produtorId = getOrCreateProdutor(produtorNomeRaw);
    if(motorista) getOrCreateMotorista(motorista, placa);

    const contratoNr = extractContratoNr(observacao);
    const contratoExistente = contratoNr ? state.contratos.find(c=>c.doc===contratoNr) : null;
    const role = classificarNatureza(operacao);

    let venda = state.vendas.find(v=>String(v.nrNF)===String(nrNF));
    if(!venda){
      venda = {
        id: uid('venda'), empresaId, produtorId, contratoId: contratoExistente ? contratoExistente.id : null,
        contratoNrRaw: contratoNr || '', nrNF: String(nrNF), dataNF: dataEmissao || todayISO(),
        pesoFiscal: null, valorFiscal: valorTotal, natureza: operacao, role, usarParaConfronto: true, colheitaId: colheitaId || null, chaveNFe: '',
        createdAt: new Date().toISOString(),
      };
      state.vendas.push(venda);
      novos++;
    } else {
      Object.assign(venda, {
        empresaId: empresaId || venda.empresaId, produtorId: produtorId || venda.produtorId,
        contratoId: venda.contratoId || (contratoExistente ? contratoExistente.id : null),
        contratoNrRaw: venda.contratoNrRaw || contratoNr || '', valorFiscal: valorTotal || venda.valorFiscal,
        natureza: operacao || venda.natureza, role: role || venda.role,
      });
      atualizados++;
    }
    const grupoKey = contratoGroupKey(venda);
    if(grupoKey) gruposTocados.add(grupoKey);

    const jaTemEntrega = state.entregas.some(e=>e.vendaId===venda.id);
    if(jaTemEntrega){ duplicados++; return; }

    state.entregas.push({
      id: uid('ent'), vendaId: venda.id, temRemessa: false, nrNFRemessa: '',
      empresaDestinoId: empresaId, motorista, placa,
      dataSaida: dataEmissao || todayISO(),
      pesoFiscal: null, valorFiscal: valorTotal,
      pesoBruto:0, umidade:0, impureza:0, ardido:0, txRecebimento:0, pesoLiquidoComDesc:0,
      status:'pendente', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
    });
  });

  gruposTocados.forEach(recalcUsarParaConfronto);

  saveCadastros(); saveVendas(); saveEntregas(); renderAll();
  const avisoPesoFiscal = ' Peso fiscal não vem nesse relatório — chega pelo romaneio (foto/manual).';
  const avisoCancel = ignoradosCancelados>0 ? ` ${ignoradosCancelados} NF(s) não autorizada(s) ignorada(s).` : '';
  const qtdSecundarias = state.vendas.filter(v=>gruposTocados.has(contratoGroupKey(v)) && v.usarParaConfronto===false).length;
  const avisoSecundarias = qtdSecundarias>0 ? ` ${qtdSecundarias} NF de remessa/complemento ficou como comprovante (contrato já tem NF de venda).` : '';
  const avisoColheita = colheitaId ? ` NF(s) nova(s) vinculada(s) à colheita selecionada.` : '';
  toast(`Importação: ${novos} NF(s) nova(s), ${atualizados} atualizada(s), ${duplicados} já tinham carga lançada.${avisoCancel}${avisoPesoFiscal}${avisoSecundarias}${avisoColheita}`);
}

/* ---- Import 1: relatório de NOTAS DE VENDA do software de gestão ---- */
function handleImportSoftwareGestaoVenda(rows, colheitaId){
  const headers = Object.keys(rows[0]);
  const keys = {
    tipoRegistro: findKey(headers,['tipo','registro']),
    numeroNota: findKey(headers,['numero','nota']),
    dataEmissao: findKey(headers,['data','emissao']),
    clienteFornecedor: findKey(headers,['cliente']),
    quantidade: findKey(headers,['quantidade']),
    produtor: findKey(headers,['produtor']),
    valorTotal: findKey(headers,['valor','total']),
    contratoPedido: findKey(headers,['contrato']),
    descricaoOperacao: findKey(headers,['descricao','operacao']),
    chaveNFe: findKey(headers,['chave','acesso']),
  };

  let novos = 0, duplicadas = 0, ignoradas = 0;
  rows.forEach(row=>{
    const tipoRegistro = keys.tipoRegistro ? stripAccents(row[keys.tipoRegistro]) : 'nota';
    if(tipoRegistro && tipoRegistro !== 'nota'){ ignoradas++; return; }

    const nrNF = keys.numeroNota ? row[keys.numeroNota] : null;
    if(!nrNF){ ignoradas++; return; }

    const empresaInfo = parseEmpresaCompound(keys.clienteFornecedor ? row[keys.clienteFornecedor] : null);
    const produtorInfo = parseProdutorCompound(keys.produtor ? row[keys.produtor] : null);
    if(!empresaInfo.nome || !produtorInfo.nome){ ignoradas++; return; }

    const empresaId = getOrCreateEmpresa(empresaInfo.nome, empresaInfo.cnpj);
    const produtorId = getOrCreateProdutor(produtorInfo.nome, produtorInfo.doc);

    const contratoDoc = keys.contratoPedido ? row[keys.contratoPedido] : null;
    const tipoContrato = inferTipoContratoPorDescricao(keys.descricaoOperacao ? row[keys.descricaoOperacao] : '');
    const contratoId = contratoDoc ? getOrCreateContrato(contratoDoc, tipoContrato, empresaId, produtorId) : null;

    const jaExiste = state.vendas.some(v=>String(v.nrNF)===String(nrNF) && v.empresaId===empresaId);
    if(jaExiste){ duplicadas++; return; }

    const venda = {
      id: uid('venda'), empresaId, produtorId, contratoId,
      nrNF: String(nrNF), dataNF: toISODate(keys.dataEmissao ? row[keys.dataEmissao] : null) || todayISO(),
      pesoFiscal: num(keys.quantidade ? row[keys.quantidade] : 0),
      valorFiscal: num(keys.valorTotal ? row[keys.valorTotal] : 0),
      chaveNFe: keys.chaveNFe ? String(row[keys.chaveNFe]||'') : '',
      colheitaId: colheitaId || null,
      createdAt: new Date().toISOString(),
    };
    state.vendas.push(venda);
    novos++;
  });

  saveCadastros(); saveVendas(); renderAll();
  toast(`Notas de venda importadas: ${novos} nova(s), ${duplicadas} já existiam, ${ignoradas} ignorada(s).`);
}

/* ---- Import 2: relatório de NOTAS DE REMESSA (repasse) — vincula à venda original ---- */
function handleImportRemessa(rawRows, colheitaId){
  let novos = 0, semVendaEncontrada = 0, duplicadas = 0;
  let current = null;

  for(let i=1;i<rawRows.length;i++){
    const r = rawRows[i] || [];
    const col0 = r[0];

    if(col0 !== null && col0 !== undefined && col0 !== '' && typeof col0 === 'number'){
      current = {
        nrNFRemessa: col0,
        dataSaida: toISODate(r[1]),
        clienteRaw: r[4],
        motorista: (r[5]||'').toString().trim(),
        placa: (r[6]||'').toString().trim().toUpperCase(),
      };
      continue;
    }
    if(current && (col0===null||col0===undefined||col0==='') && typeof r[3] === 'number' && typeof r[4] === 'string'){
      const nrNFVenda = r[3];
      const quantidade = num(r[6]);
      const valorTotalItem = num(r[8]);

      let venda = state.vendas.find(v=>String(v.nrNF)===String(nrNFVenda));
      if(!venda){
        // Este relatório de remessa não traz o produtor (só comprador final/motorista/placa).
        // Em vez de descartar a linha, criamos a venda como PENDÊNCIA (produtor/empresa "a identificar"),
        // para não perder a NF/romaneio — ela aparece em "Cargas & Romaneios" com um aviso, e alguém completa
        // o produtor manualmente depois (o padrão do romaneio/pesagem NÃO muda).
        venda = {
          id: uid('venda'), empresaId: null, produtorId: null, contratoId: null,
          nrNF: String(nrNFVenda), dataNF: current.dataSaida || todayISO(),
          pesoFiscal: quantidade, valorFiscal: valorTotalItem, chaveNFe: '',
          precisaCompletar: true, colheitaId: colheitaId || null,
          createdAt: new Date().toISOString(),
        };
        state.vendas.push(venda);
        semVendaEncontrada++;
      }

      const jaExiste = state.entregas.some(e=>e.nrNFRemessa===String(current.nrNFRemessa) && e.vendaId===venda.id);
      if(jaExiste){ duplicadas++; current = null; continue; }

      const nomeDestino = parseClienteDestino(current.clienteRaw);
      const empresaDestinoId = nomeDestino ? getOrCreateEmpresa(nomeDestino) : null;
      if(current.motorista) getOrCreateMotorista(current.motorista, current.placa);

      const entrega = {
        id: uid('ent'), vendaId: venda.id, temRemessa:true, nrNFRemessa: String(current.nrNFRemessa),
        empresaDestinoId, motorista: current.motorista, placa: current.placa,
        dataSaida: current.dataSaida || todayISO(),
        pesoFiscal: quantidade || venda.pesoFiscal, valorFiscal: valorTotalItem || venda.valorFiscal,
        pesoBruto:0, umidade:0, impureza:0, ardido:0, txRecebimento:0, pesoLiquidoComDesc:0,
        status:'pendente', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
      };
      state.entregas.push(entrega);
      novos++;
      current = null;
    }
  }

  saveCadastros(); saveVendas(); saveEntregas(); renderAll();
  const avisoSemVenda = semVendaEncontrada>0 ? ` ${semVendaEncontrada} entrega(s) sem produtor identificado — completar em "Cargas & Romaneios".` : '';
  toast(`Remessas importadas: ${novos} nova(s) entrega(s) pendente(s) de pesagem, ${duplicadas} já existiam.${avisoSemVenda}`);
}

/* ---- Import 3: planilha legada interna (NF + romaneio na mesma linha) ---- */
function handleImportLegacy(rows, colheitaId){
  const headers = Object.keys(rows[0]);
  const keys = {
    empresa: findKey(headers,['empresa']),
    proprietario: findKey(headers,['proprietario']),
    natureza: findKey(headers,['natureza']),
    contrato: findKey(headers,['contrato']),
    nrNF: findKey(headers,['nf']),
    pesoFiscal: findKey(headers,['peso','fiscal']),
    motorista: findKey(headers,['motorista']),
    nrRomaneio: findKey(headers,['romaneio'],['data']),
    dataSaida: findKey(headers,['data','romaneio']),
    pesoBruto: findKey(headers,['peso','bruto']),
    umidade: findKey(headers,['umidade']),
    impureza: findKey(headers,['impureza']),
    ardido: findKey(headers,['ardido']),
    tx: findKey(headers,['recebimento']),
    pesoLiquidoCom: findKey(headers,['peso','liquido','com']),
    precoFrete: findKey(headers,['preco','frete'],['valor']),
  };

  let novasEntregas = 0, novasVendas = 0, ignoradas = 0;
  rows.forEach(row=>{
    const empresaNomeRaw = keys.empresa ? row[keys.empresa] : null;
    const produtorNomeRaw = keys.proprietario ? row[keys.proprietario] : null;
    if(!empresaNomeRaw && !produtorNomeRaw) { ignoradas++; return; }

    const empresaId = getOrCreateEmpresa(empresaNomeRaw);
    const produtorId = getOrCreateProdutor(produtorNomeRaw);
    const natureza = keys.natureza ? row[keys.natureza] : null;
    const contratoDoc = keys.contrato ? row[keys.contrato] : null;
    const contratoId = contratoDoc ? getOrCreateContrato(contratoDoc, natureza, empresaId, produtorId) : null;

    const nrNF = keys.nrNF ? row[keys.nrNF] : null;
    const nrRomaneio = keys.nrRomaneio ? row[keys.nrRomaneio] : null;
    const hasRomaneio = nrRomaneio !== null && nrRomaneio !== undefined && String(nrRomaneio).trim()!=='';
    if(!nrNF && !hasRomaneio){ ignoradas++; return; }

    let venda = nrNF ? state.vendas.find(v=>String(v.nrNF)===String(nrNF) && v.empresaId===empresaId) : null;
    if(!venda){
      venda = {
        id: uid('venda'), empresaId, produtorId, contratoId,
        nrNF: nrNF!=null ? String(nrNF) : ('S/N-'+uid('')), dataNF: todayISO(),
        pesoFiscal: num(keys.pesoFiscal ? row[keys.pesoFiscal] : PESO_FISCAL_PADRAO) || PESO_FISCAL_PADRAO,
        valorFiscal: 0, chaveNFe:'', colheitaId: colheitaId || null, createdAt: new Date().toISOString(),
      };
      state.vendas.push(venda);
      novasVendas++;
    }

    if(hasRomaneio){
      const {motorista, placa} = parseMotoristaPlaca(keys.motorista ? row[keys.motorista] : null);
      if(motorista) getOrCreateMotorista(motorista, placa);
      const entrega = {
        id: uid('ent'), vendaId: venda.id, temRemessa:false, nrNFRemessa:'', empresaDestinoId:null,
        motorista, placa, nrRomaneio: String(nrRomaneio),
        dataSaida: toISODate(keys.dataSaida ? row[keys.dataSaida] : null) || todayISO(),
        pesoFiscal: venda.pesoFiscal,
        pesoBruto: num(keys.pesoBruto ? row[keys.pesoBruto] : 0),
        umidade: num(keys.umidade ? row[keys.umidade] : 0),
        impureza: num(keys.impureza ? row[keys.impureza] : 0),
        ardido: num(keys.ardido ? row[keys.ardido] : 0),
        txRecebimento: num(keys.tx ? row[keys.tx] : 0),
        pesoLiquidoComDesc: num(keys.pesoLiquidoCom ? row[keys.pesoLiquidoCom] : 0),
        precoFrete: num(keys.precoFrete ? row[keys.precoFrete] : 0),
        createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
      };
      recalcEntrega(entrega);
      entrega.status = 'completo';
      state.entregas.push(entrega);
      novasEntregas++;
    }
  });

  saveCadastros(); saveVendas(); saveEntregas(); renderAll();
  toast(`Importação concluída: ${novasVendas} venda(s) nova(s), ${novasEntregas} entrega(s) completa(s), ${ignoradas} linha(s) ignorada(s).`);
}

/* ---- Dispatcher de importação ---- */
let arquivoImportacaoPendente = null;
function abrirSelecaoColheitaImportacao(file){
  arquivoImportacaoPendente = file;
  openCadastroModal('selecionarColheitaImportacao', null);
}
function confirmarImportacaoComColheita(){
  const sel = document.getElementById('fSelecionarColheitaImportacao');
  const colheitaId = sel && sel.value ? sel.value : null;
  const file = arquivoImportacaoPendente;
  arquivoImportacaoPendente = null;
  closeCadastroModal();
  if(file) handleImportFile(file, colheitaId);
}
function handleImportFile(file, colheitaId){
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
      const sheetName = wb.SheetNames.find(n=>stripAccents(n).includes('base')) || wb.SheetNames[0];
      const sheet = wb.Sheets[sheetName];

      const rawRows = XLSX.utils.sheet_to_json(sheet, {header:1, defval:null});
      if(!rawRows.length){ toast('Não encontrei linhas de dados nessa planilha.', true); return; }
      const headerRow = rawRows[0].map(h=>String(h==null?'':h));

      if(isFormatoRemessa(headerRow)){
        handleImportRemessa(rawRows, colheitaId);
        return;
      }

      const objRows = XLSX.utils.sheet_to_json(sheet, {defval:null});
      if(!objRows.length){ toast('Não encontrei linhas de dados nessa planilha.', true); return; }
      const headers = Object.keys(objRows[0]);
      if(isFormatoPadraoNF(headers)) handleImportPadraoNF(objRows, colheitaId);
      else if(isFormatoSoftwareGestaoVenda(headers)) handleImportSoftwareGestaoVenda(objRows, colheitaId);
      else handleImportLegacy(objRows, colheitaId);
    }catch(err){
      console.error(err);
      toast('Não foi possível ler essa planilha. Confira o formato.', true);
    }
  };
  reader.readAsArrayBuffer(file);
}

/* ---- Exportação ---- */
function exportToXlsx(){
  const headers = ['Nº NF Venda','Nº NF Remessa','Empresa Venda','Empresa Destino Final','Produtor','Natureza','Contrato',
    'Data Saída','Motorista','Placa','Nº Romaneio','Peso Fiscal','Valor Fiscal','Peso Bruto (Kg)','Umidade (kg)','Impureza',
    'Ardido/Avariado','Tx Recebimento (kg)','Peso Líquido COM desc.(Kg)','Peso Líquido SEM desc.(Kg)',
    'Scs Bruto','Scs Líquido COM desc.','Scs Líquido SEM desc.','Preço frete (R$/Sc Bruto)','Valor do frete','Status'];

  const rows = state.entregas.map(e=>{
    const v = vendaById(e.vendaId);
    const contrato = v && v.contratoId ? contratoById(v.contratoId) : null;
    return [
      v?v.nrNF:'', e.nrNFRemessa||'', v?empresaNome(v.empresaId):'', empresaNome(empresaDestinoEfetivaId(e)),
      v?produtorNome(v.produtorId):'', contrato?contrato.tipo:'', contrato?contrato.doc:'',
      e.dataSaida||'', e.motorista||'', e.placa||'', e.nrRomaneio||'', e.pesoFiscal||'', e.valorFiscal||'',
      e.pesoBruto||'', e.umidade||0, e.impureza||0, e.ardido||0, e.txRecebimento||0,
      e.pesoLiquidoComDesc||'', e.pesoLiquidoSemDesc||'', e.scsBruto||'', e.scsLiquidoComDesc||'', e.scsLiquidoSemDesc||'',
      e.precoFrete||'', e.valorFrete||'', e.status
    ];
  });
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'VENDAS E ENTREGAS');

  const wsProdutores = XLSX.utils.aoa_to_sheet([
    ['Nome','CPF'],
    ...state.produtores.map(p=>[p.nome, p.cpf||''])
  ]);
  XLSX.utils.book_append_sheet(wb, wsProdutores, 'PRODUTORES');

  const wsContratos = XLSX.utils.aoa_to_sheet([
    ['Tipo','Nº Contrato','Empresa','Produtor','Cultura','Volume (kg)','Valor do kg','Volume (sacas)','Valor da saca','Início entrega','Final entrega','Data pagamento'],
    ...state.contratos.map(c=>[c.tipo, c.doc, empresaNome(c.empresaId), produtorNome(c.produtorId), culturaNome(c.culturaId), c.volumeKg||'', c.valorKg||'', c.volumeSacas||'', c.valorSaca||'', c.dataInicioEntrega||'', c.dataFinalEntrega||'', c.dataPagamento||''])
  ]);
  XLSX.utils.book_append_sheet(wb, wsContratos, 'CONTRATOS');

  const saldos = calcSaldos();
  const wsSaldos = XLSX.utils.aoa_to_sheet([
    ['Tipo','Empresa','Produtor','Doc','Volume Contratado','Scs Entregues','Saldo'],
    ...saldos.map(s=>[s.contrato.tipo, empresaNome(s.contrato.empresaId), produtorNome(s.contrato.produtorId), s.contrato.doc, s.isVenda?s.volume:'', s.scsEntregues, s.saldo])
  ]);
  XLSX.utils.book_append_sheet(wb, wsSaldos, 'SALDOS DE CONTRATO');

  const wsTalhoes = XLSX.utils.aoa_to_sheet([
    ['Nº Colheita','Cultura','Variedade','Hectares','Talhão','Produtor'],
    ...state.colheitas.map((t,i)=>{
      const cultura = t.culturaId ? culturaById(t.culturaId) : null;
      const variedade = cultura ? cultura.variedades.find(v=>v.id===t.variedadeId) : null;
      return [i+1, cultura?cultura.nome:'', variedade?variedade.nome:'', t.area||0, t.talhao||'', t.produtorId?produtorNome(t.produtorId):''];
    })
  ]);
  XLSX.utils.book_append_sheet(wb, wsTalhoes, 'COLHEITAS');

  XLSX.writeFile(wb, `COLHEITA_export_${todayISO()}.xlsx`);
  toast('Planilha exportada.');
}

/* ---------------- LOGIN / SESSÃO ---------------- */
const SESSION_KEY = 'brc_session';
function getSessao(){
  try{ return JSON.parse(localStorage.getItem(SESSION_KEY) || 'null'); }catch(e){ return null; }
}
function setSessao(s){ localStorage.setItem(SESSION_KEY, JSON.stringify(s)); }
function logout(){ localStorage.removeItem(SESSION_KEY); location.hash=''; location.reload(); }

function renderLoginScreen(erro){
  document.body.innerHTML = `
    <div style="max-width:380px;margin:0 auto;padding:60px 18px;">
      <h1 class="disp" style="font-size:24px;margin:0 0 4px 0;color:var(--gold);letter-spacing:-.3px;">BRC</h1>
      <p style="color:var(--ink-dim);font-size:13px;margin:0 0 22px 0;">Entre com seu usuário e senha para acessar o painel.</p>
      <div class="field"><label>Usuário</label><input id="fLoginUsuario" autocomplete="username"></div>
      <div class="field"><label>Senha</label><input id="fLoginSenha" type="password" autocomplete="current-password"></div>
      ${erro ? `<div style="color:var(--red);font-size:13px;margin:6px 0 4px 0;">${erro}</div>` : ''}
      <button class="btn" style="width:100%;padding:12px;font-size:15px;margin-top:10px;" onclick="tentarLogin()">Entrar</button>
    </div>
  `;
  document.getElementById('fLoginSenha').addEventListener('keydown', e=>{ if(e.key==='Enter') tentarLogin(); });
}
function tentarLogin(){
  const usuario = document.getElementById('fLoginUsuario').value.trim();
  const senha = document.getElementById('fLoginSenha').value;
  const u = state.usuarios.find(x=>x.usuario.toLowerCase()===usuario.toLowerCase());
  if(!u){ renderLoginScreen('Usuário ou senha incorretos.'); return; }
  const senhaOk = u.papel==='motorista'
    ? (u.senha ? senha===u.senha : stripAccents(senha)===stripAccents(state.config.fazenda||''))
    : senha===u.senha;
  if(!senhaOk){ renderLoginScreen('Usuário ou senha incorretos.'); return; }
  if(usuarioExpirado(u)){ renderLoginScreen('Este acesso expirou. Fale com o administrador.'); return; }
  setSessao({ usuarioId: u.id, usuario: u.usuario, papel: u.papel, motoristaId: u.motoristaId||null,
    podeGerenciarUsuarios: u.podeGerenciarUsuarios, podeLiberarAcessoMotorista: u.podeLiberarAcessoMotorista, podeDefinirSenhaMotorista: u.podeDefinirSenhaMotorista });
  bootAfterLogin();
}
async function syncGoogleSheet(){
  try{
    const res = await fetch(`${API_BASE}/sheet-sync`, { headers: { 'x-api-key': API_KEY } });
    if(!res.ok) return; // silencioso: pode ainda não estar configurado no Render
    const data = await res.json();
    if(!data.rows || !data.rows.length) return;
    const headers = data.headers || [];
    if(isFormatoPadraoNF(headers)) handleImportPadraoNF(data.rows, null);
    else if(isFormatoSoftwareGestaoVenda(headers)) handleImportSoftwareGestaoVenda(data.rows, null);
    else handleImportLegacy(data.rows, null);
  }catch(e){ /* silencioso: sincronização automática não deve incomodar o usuário */ }
}

function bootAfterLogin(){
  const s = getSessao();
  if(s.papel==='motorista'){
    const m = state.motoristas.find(x=>x.id===s.motoristaId);
    renderModoMotorista(m?.placa||'');
    return;
  }
  document.body.innerHTML = APP_SHELL_HTML;
  if(s.papel==='produtor'){
    window.modoSomenteLeitura = true;
    document.body.classList.add('read-only');
  }
  if(s.papel==='admin'){
    if(s.podeGerenciarUsuarios===false) document.body.classList.add('sem-acesso-usuarios');
    if(s.podeLiberarAcessoMotorista===false) document.body.classList.add('sem-liberar-acesso-motorista');
    if(s.podeDefinirSenhaMotorista===false) document.body.classList.add('sem-senha-motorista');
  }
  bindShellEvents();
  renderAll();
  const label = document.getElementById('sessaoUsuarioLabel');
  if(label) label.textContent = `${s.usuario} · ${labelPapel(s.papel)}`;
  if(s.papel==='admin'){
    syncGoogleSheet();
    setInterval(syncGoogleSheet, 5*60*1000);
  }
}

(async function init(){
  document.getElementById('tab-cadastros').innerHTML = `<div class="empty-state"><div class="icon">⏳</div>Carregando dados...</div>`;
  await loadState();

  const sessao = getSessao();
  const usuarioSessao = sessao ? state.usuarios.find(u=>u.id===sessao.usuarioId) : null;
  if(!sessao || !usuarioSessao || usuarioExpirado(usuarioSessao)){
    localStorage.removeItem(SESSION_KEY);
    renderLoginScreen();
    return;
  }
  bootAfterLogin();
})();
